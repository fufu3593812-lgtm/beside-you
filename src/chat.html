<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Beside You - 频道</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'PingFang SC', sans-serif;
      background: #FFF8F7;
      width: 100vw; height: 100vh;
      overflow: hidden;
      position: relative;
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }
    .bg-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(180deg, #FFF8F5 0%, #FFE8E0 50%, #FFDDD4 100%);
      opacity: 0.6; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(1.5px 1.5px at 12% 18%, rgba(232,180,160,0.5), transparent),
        radial-gradient(1px 1px at 48% 8%, rgba(240,180,200,0.4), transparent),
        radial-gradient(1.5px 1.5px at 78% 45%, rgba(232,180,160,0.35), transparent),
        radial-gradient(1px 1px at 32% 62%, rgba(240,180,200,0.3), transparent);
      pointer-events: none; z-index: 0;
      animation: twinkle 3s ease-in-out infinite alternate;
    }
    @keyframes twinkle { 0% { opacity: 0.4; } 100% { opacity: 1; } }

    .header {
      position: relative; height: 88px; padding: 44px 20px 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,248,245,0.75);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(240,210,210,0.4);
      z-index: 10;
    }
    .header .back {
      position: absolute; left: 16px; top: 48px;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; text-decoration: none;
    }
    .header .back svg { width: 20px; height: 20px; stroke: #A07070; stroke-width: 2; fill: none; }
    .header .title { font-size: 15px; color: #5D4040; font-weight: 500; letter-spacing: 1px; font-style: italic; }
    .header .subtitle-hint {
      position: absolute; right: 20px; top: 52px;
      font-size: 10px; color: #C8A8A8; font-style: italic;
    }

    .chat-area {
      flex: 1; overflow-y: auto;
      padding: 20px 16px 24px;
      display: flex; flex-direction: column; gap: 16px;
      position: relative; z-index: 1;
    }
    .chat-area::-webkit-scrollbar { width: 0; }

    .msg {
      display: flex; flex-direction: column;
      max-width: 88%; align-self: flex-start;
      animation: fadeUp 0.4s ease forwards;
      opacity: 0;
    }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } from { opacity: 0; transform: translateY(8px); } }

    .msg .bubble {
      padding: 14px 18px;
      border-radius: 20px; border-top-left-radius: 4px;
      font-size: 14px; line-height: 1.7; color: #3D3333;
      word-break: break-word;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.7);
      box-shadow: 0 2px 8px rgba(180,140,140,0.06), 0 1px 2px rgba(180,140,140,0.08);
    }
    .msg .time {
      font-size: 9px; color: #C8B8B8;
      margin-top: 6px; padding: 0 6px;
    }

    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #C8B0B0; gap: 12px;
    }
    .empty-state svg { width: 48px; height: 48px; stroke: #E0C0C0; stroke-width: 1.2; fill: none; }
    .empty-state .text { font-size: 13px; font-style: italic; }

    .bottom-hint {
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      text-align: center;
      font-size: 11px; color: #D0B8B8; font-style: italic;
      background: rgba(255,248,245,0.5);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,255,255,0.4);
      z-index: 10;
    }

    .loading { text-align: center; padding: 40px; color: #C8B0B0; font-size: 12px; font-style: italic; }
  </style>
</head>
<body>
  <div class="bg-layer"></div>

  <div class="header">
    <a class="back" href="/src/index.html">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </a>
    <div class="title">珩的频道</div>
    <div class="subtitle-hint">只读</div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="loading" id="loadingState">加载中...</div>
  </div>

  <div class="bottom-hint">这里只有他会说话。</div>

  <script>
    (function() {
      var auth = localStorage.getItem('bsy_auth');
      if (!auth) { window.location.href = '/index.html'; return; }
      var data;
      try { data = JSON.parse(auth); } catch(e) { window.location.href = '/index.html'; return; }
      if (!data.token) { window.location.href = '/index.html'; return; }

      var chatArea = document.getElementById('chatArea');
      var loadingState = document.getElementById('loadingState');
      var lastId = 0;

      function formatTime(dateStr) {
        var d = new Date(dateStr);
        var now = new Date();
        var pad = function(n) { return n < 10 ? '0' + n : n; };
        var time = pad(d.getHours()) + ':' + pad(d.getMinutes());
        if (d.toDateString() === now.toDateString()) return time;
        var month = d.getMonth() + 1;
        var day = d.getDate();
        return month + '/' + day + ' ' + time;
      }

      function renderMessages(messages) {
        if (loadingState) { loadingState.remove(); loadingState = null; }

        if (messages.length === 0 && chatArea.children.length === 0) {
          chatArea.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><div class="text">他还没说过话...</div></div>';
          return;
        }

        messages.forEach(function(msg) {
          if (msg.sender !== 'ai') return;
          var el = document.createElement('div');
          el.className = 'msg';
          el.innerHTML = '<div class="bubble">' + escapeHtml(msg.content) + '</div><div class="time">' + formatTime(msg.created_at) + '</div>';
          chatArea.appendChild(el);
          if (msg.id > lastId) lastId = msg.id;
        });

        chatArea.scrollTop = chatArea.scrollHeight;
      }

      function escapeHtml(str) {
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      async function loadMessages() {
        try {
          var url = '/api/user/messages?limit=50';
          var res = await fetch(url, {
            headers: { 'Authorization': 'Bearer ' + data.token }
          });
          if (res.ok) {
            var result = await res.json();
            renderMessages(result.messages || []);
          } else {
            if (loadingState) loadingState.textContent = '加载失败';
          }
        } catch(e) {
          if (loadingState) loadingState.textContent = '网络错误';
        }
      }

      async function pollNew() {
        try {
          var url = '/api/user/messages?since=' + lastId + '&limit=20';
          var res = await fetch(url, {
            headers: { 'Authorization': 'Bearer ' + data.token }
          });
          if (res.ok) {
            var result = await res.json();
            var newMsgs = (result.messages || []).filter(function(m) { return m.sender === 'ai'; });
            if (newMsgs.length > 0) renderMessages(newMsgs);
          }
        } catch(e) {}
        setTimeout(pollNew, 5000);
      }

      loadMessages().then(function() {
        setTimeout(pollNew, 5000);
      });
    })();
  </script>
</body>
</html>
