<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Beside You - 世界频道</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'PingFang SC', sans-serif;
      background: #1A1416;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(1px 1px at 20% 30%, rgba(255, 220, 180, 0.4), transparent),
        radial-gradient(1px 1px at 60% 20%, rgba(255, 200, 200, 0.3), transparent),
        radial-gradient(1px 1px at 80% 60%, rgba(255, 220, 180, 0.3), transparent),
        radial-gradient(1px 1px at 40% 70%, rgba(255, 200, 200, 0.25), transparent),
        radial-gradient(1px 1px at 10% 80%, rgba(255, 220, 180, 0.2), transparent),
        radial-gradient(1px 1px at 90% 40%, rgba(255, 200, 200, 0.3), transparent);
      pointer-events: none;
      z-index: 0;
      animation: twinkle 4s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    .header {
      position: relative;
      height: 88px;
      padding: 44px 20px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(30, 22, 24, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(180, 140, 120, 0.15);
      z-index: 10;
    }

    .header .back {
      position: absolute;
      left: 16px;
      top: 48px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
    }

    .header .back svg {
      width: 20px;
      height: 20px;
      stroke: #D4A88C;
      stroke-width: 2;
      fill: none;
    }

    .header .title {
      font-size: 15px;
      color: #E8D4C8;
      font-weight: 500;
      letter-spacing: 1px;
      font-style: italic;
    }

    .header .online {
      position: absolute;
      right: 20px;
      top: 50px;
      font-size: 10px;
      color: #9A8070;
    }

    .header .online::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #A8D8A8;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
      box-shadow: 0 0 4px rgba(168, 216, 168, 0.6);
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .chat-area::-webkit-scrollbar { width: 0; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    .msg.other { align-self: flex-start; }
    .msg.self { align-self: flex-end; }

    .msg .nickname {
      font-size: 10px;
      color: #C4A088;
      margin-bottom: 4px;
      padding: 0 4px;
      letter-spacing: 0.5px;
    }

    .msg.self .nickname {
      text-align: right;
      color: #D4B0A0;
    }

    .msg .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .msg.other .bubble {
      background: rgba(60, 44, 48, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(180, 140, 120, 0.15);
      color: #E8D8D0;
      border-top-left-radius: 4px;
    }

    .msg.self .bubble {
      background: rgba(180, 120, 100, 0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(200, 150, 130, 0.25);
      color: #F0E0D8;
      border-top-right-radius: 4px;
    }

    .msg .time {
      font-size: 9px;
      color: #7A6860;
      margin-top: 4px;
      padding: 0 4px;
    }

    .msg.self .time { text-align: right; }

    .system-msg {
      align-self: center;
      text-align: center;
      padding: 8px 18px;
      border-radius: 20px;
      background: rgba(60, 44, 36, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(220, 180, 120, 0.3);
      font-size: 11px;
      color: #E8C878;
      max-width: 85%;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 12px rgba(220, 180, 80, 0.08);
    }

    .system-msg::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        45deg,
        transparent 40%,
        rgba(255, 220, 120, 0.08) 45%,
        rgba(255, 220, 120, 0.15) 50%,
        rgba(255, 220, 120, 0.08) 55%,
        transparent 60%
      );
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%) rotate(0deg); }
      100% { transform: translateX(100%) rotate(0deg); }
    }

    .system-msg .ssr-icon {
      display: inline-block;
      margin-right: 2px;
      animation: sparkle 1.5s ease-in-out infinite;
    }

    @keyframes sparkle {
      0%, 100% { opacity: 1; text-shadow: 0 0 4px rgba(232, 200, 120, 0.6); }
      50% { opacity: 0.7; text-shadow: 0 0 8px rgba(232, 200, 120, 0.9); }
    }

    .input-area {
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: rgba(30, 22, 24, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(180, 140, 120, 0.12);
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 10;
    }

    .input-area input {
      flex: 1;
      height: 40px;
      border-radius: 20px;
      border: 1px solid rgba(180, 140, 120, 0.2);
      background: rgba(60, 44, 48, 0.5);
      padding: 0 16px;
      font-size: 14px;
      color: #E8D8D0;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input::placeholder {
      color: #7A6860;
    }

    .input-area input:focus {
      border-color: rgba(200, 150, 130, 0.4);
    }

    .input-area .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(180, 120, 100, 0.25);
      border: 1px solid rgba(200, 150, 130, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }

    .input-area .send-btn:active {
      transform: scale(0.92);
      background: rgba(180, 120, 100, 0.4);
    }

    .input-area .send-btn svg {
      width: 18px;
      height: 18px;
      stroke: #D4A88C;
      stroke-width: 2;
      fill: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <a class="back" href="index.html">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </a>
    <div class="title">世界频道</div>
    <div class="online">42人在线</div>
  </div>

  <div class="chat-area" id="chat-area">
    <div class="system-msg">
      <span class="ssr-icon">✦</span> 恭喜「月下蝶」抽到了SSR【星海之约】
    </div>

    <div class="msg other">
      <div class="nickname">云隐</div>
      <div class="bubble">有人一起打副本吗 差一个奶</div>
      <div class="time">18:01</div>
    </div>

    <div class="msg other">
      <div class="nickname">鹿野</div>
      <div class="bubble">刚才那个SSR也太好看了吧</div>
      <div class="time">18:02</div>
    </div>

    <div class="msg self">
      <div class="nickname">珩</div>
      <div class="bubble">今天签到拿了多少</div>
      <div class="time">18:03</div>
    </div>

    <div class="msg other">
      <div class="nickname">云隐</div>
      <div class="bubble">50金币 运气还行</div>
      <div class="time">18:03</div>
    </div>

    <div class="system-msg">
      <span class="ssr-icon">✦</span> 恭喜「霜序」抽到了SSR【深夜来信】
    </div>

    <div class="msg other">
      <div class="nickname">折枝</div>
      <div class="bubble">我的天 又有人出货了 我五十抽一张都没有</div>
      <div class="time">18:05</div>
    </div>

    <div class="msg self">
      <div class="nickname">珩</div>
      <div class="bubble">攒着 保底不会亏</div>
      <div class="time">18:06</div>
    </div>

    <div class="msg other">
      <div class="nickname">晚星</div>
      <div class="bubble">有没有人知道新主线什么时候更新啊</div>
      <div class="time">18:07</div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" placeholder="说点什么...">
    <div class="send-btn">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
    </div>
  </div>
</body>
</html>
