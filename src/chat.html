<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Beside You - 世界频道</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'PingFang SC', sans-serif;
      background: #FFF8F7;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80px 80px at 15% 15%, rgba(245, 200, 200, 0.2), transparent),
        radial-gradient(ellipse 60px 100px at 85% 20%, rgba(240, 210, 220, 0.15), transparent),
        radial-gradient(ellipse 100px 60px at 10% 80%, rgba(240, 220, 210, 0.15), transparent),
        radial-gradient(ellipse 70px 90px at 90% 75%, rgba(245, 200, 210, 0.12), transparent);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(1.5px 1.5px at 12% 18%, rgba(232, 180, 160, 0.5), transparent),
        radial-gradient(1px 1px at 48% 8%, rgba(240, 180, 200, 0.4), transparent),
        radial-gradient(1.5px 1.5px at 78% 45%, rgba(232, 180, 160, 0.35), transparent),
        radial-gradient(1px 1px at 32% 62%, rgba(240, 180, 200, 0.3), transparent),
        radial-gradient(1px 1px at 88% 28%, rgba(255, 200, 180, 0.35), transparent),
        radial-gradient(1.5px 1.5px at 22% 82%, rgba(240, 180, 200, 0.25), transparent);
      pointer-events: none;
      z-index: 0;
      animation: twinkle 3s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .header {
      position: relative;
      height: 88px;
      padding: 44px 20px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 248, 245, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(240, 210, 210, 0.4);
      z-index: 10;
    }

    .header .back {
      position: absolute;
      left: 16px;
      top: 48px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
    }

    .header .back svg {
      width: 20px;
      height: 20px;
      stroke: #A07070;
      stroke-width: 2;
      fill: none;
    }

    .header .title {
      font-size: 15px;
      color: #5D4040;
      font-weight: 500;
      letter-spacing: 1px;
      font-style: italic;
    }

    .header .online {
      position: absolute;
      right: 20px;
      top: 50px;
      font-size: 10px;
      color: #B8A0A0;
    }

    .header .online::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #A8D8A8;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }

    .header .ornament {
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .header .ornament::before,
    .header .ornament::after {
      content: '❦';
      font-size: 10px;
      color: #E0B0B0;
    }

    .header .ornament .center-gem {
      width: 6px;
      height: 6px;
      background: linear-gradient(135deg, #F5C4C4, #E8A0A0);
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(232, 160, 160, 0.4);
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      z-index: 1;
    }

    .chat-area::-webkit-scrollbar { width: 0; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 78%;
    }

    .msg.other { align-self: flex-start; }
    .msg.self { align-self: flex-end; }

    .msg .nickname {
      font-size: 10px;
      color: #B8A0A0;
      margin-bottom: 4px;
      padding: 0 6px;
      font-style: italic;
    }

    .msg.self .nickname {
      text-align: right;
      color: #C09090;
    }

    .msg .bubble {
      padding: 11px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      position: relative;
    }

    .msg.other .bubble {
      background: linear-gradient(168deg, rgba(255, 255, 255, 0.72) 0%, rgba(248, 242, 242, 0.48) 100%);
      backdrop-filter: blur(16px) saturate(1.3);
      -webkit-backdrop-filter: blur(16px) saturate(1.3);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-bottom-color: rgba(225, 205, 205, 0.4);
      box-shadow:
        inset 0 1.5px 0 rgba(255, 255, 255, 0.9),
        inset 0 -1px 0 rgba(200, 180, 180, 0.12),
        0 2px 3px rgba(180, 140, 140, 0.08),
        0 5px 8px rgba(180, 140, 140, 0.05),
        0 10px 20px rgba(180, 140, 140, 0.03);
      color: #3D3333;
      border-top-left-radius: 4px;
      transform: translateY(0);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .msg.other .bubble:active {
      transform: translateY(1px);
      box-shadow:
        inset 0 1.5px 0 rgba(255, 255, 255, 0.9),
        inset 0 -1px 0 rgba(200, 180, 180, 0.12),
        0 1px 2px rgba(180, 140, 140, 0.06),
        0 3px 5px rgba(180, 140, 140, 0.03);
    }

    .msg.self .bubble {
      background: linear-gradient(168deg, rgba(255, 222, 222, 0.62) 0%, rgba(242, 195, 195, 0.38) 100%);
      backdrop-filter: blur(16px) saturate(1.3);
      -webkit-backdrop-filter: blur(16px) saturate(1.3);
      border: 1px solid rgba(255, 218, 218, 0.6);
      border-bottom-color: rgba(215, 165, 165, 0.3);
      box-shadow:
        inset 0 1.5px 0 rgba(255, 240, 240, 0.9),
        inset 0 -1px 0 rgba(200, 160, 160, 0.12),
        0 2px 3px rgba(200, 140, 140, 0.09),
        0 5px 8px rgba(200, 140, 140, 0.05),
        0 10px 20px rgba(200, 140, 140, 0.03);
      color: #3D3333;
      border-top-right-radius: 4px;
      transform: translateY(0);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .msg.self .bubble:active {
      transform: translateY(1px);
      box-shadow:
        inset 0 1.5px 0 rgba(255, 240, 240, 0.9),
        inset 0 -1px 0 rgba(200, 160, 160, 0.12),
        0 1px 2px rgba(200, 140, 140, 0.06),
        0 3px 5px rgba(200, 140, 140, 0.03);
    }

    .msg .time {
      font-size: 9px;
      color: #C8B8B8;
      margin-top: 4px;
      padding: 0 6px;
    }

    .msg.self .time { text-align: right; }

    .system-msg {
      align-self: center;
      text-align: center;
      padding: 8px 20px;
      border-radius: 20px;
      background: linear-gradient(168deg, rgba(255, 248, 228, 0.72) 0%, rgba(252, 238, 205, 0.48) 100%);
      backdrop-filter: blur(12px) saturate(1.3);
      -webkit-backdrop-filter: blur(12px) saturate(1.3);
      border: 1px solid rgba(248, 218, 155, 0.5);
      border-bottom-color: rgba(218, 178, 95, 0.3);
      box-shadow:
        inset 0 1.5px 0 rgba(255, 250, 218, 0.9),
        0 2px 3px rgba(200, 160, 80, 0.07),
        0 5px 10px rgba(200, 160, 80, 0.04);
      font-size: 11px;
      color: #B8863A;
      max-width: 92%;
    }

    .system-msg .ssr-icon {
      display: inline-block;
      margin-right: 2px;
      animation: sparkle 1.5s ease-in-out infinite;
    }

    @keyframes sparkle {
      0%, 100% { opacity: 1; text-shadow: 0 0 3px rgba(200, 160, 60, 0.5); }
      50% { opacity: 0.7; text-shadow: 0 0 6px rgba(200, 160, 60, 0.8); }
    }

    .chat-divider {
      align-self: center;
      font-size: 9px;
      color: #E0C0C0;
      letter-spacing: 3px;
      padding: 4px 0;
    }

    .input-area {
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: rgba(255, 248, 245, 0.7);
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
      border-top: 1px solid rgba(255, 255, 255, 0.5);
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 10;
      position: relative;
    }

    .input-area::before {
      content: '· · ·';
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: #E0C0C0;
      letter-spacing: 6px;
    }

    .input-area input {
      flex: 1;
      height: 40px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-bottom-color: rgba(220, 200, 200, 0.4);
      background: linear-gradient(168deg, rgba(255, 255, 255, 0.6) 0%, rgba(248, 242, 242, 0.38) 100%);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 0 16px;
      font-size: 14px;
      color: #3D3333;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.7),
        0 3px 6px rgba(180, 140, 140, 0.05),
        0 1px 2px rgba(180, 140, 140, 0.07);
    }

    .input-area input::placeholder {
      color: #C8B8B8;
      font-style: italic;
    }

    .input-area input:focus {
      border-color: rgba(232, 160, 160, 0.5);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.7),
        0 4px 12px rgba(232, 160, 160, 0.12),
        0 1px 2px rgba(180, 140, 140, 0.06);
    }

    .input-area .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(168deg, rgba(255, 212, 212, 0.62) 0%, rgba(238, 178, 178, 0.42) 100%);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 208, 208, 0.6);
      border-bottom-color: rgba(198, 148, 148, 0.3);
      box-shadow:
        inset 0 1.5px 0 rgba(255, 232, 232, 0.9),
        0 3px 6px rgba(200, 140, 140, 0.09),
        0 1px 2px rgba(200, 140, 140, 0.11);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .input-area .send-btn:active {
      transform: translateY(1px);
      box-shadow:
        inset 0 1.5px 0 rgba(255, 232, 232, 0.9),
        0 1px 3px rgba(200, 140, 140, 0.06);
    }

    .input-area .send-btn svg {
      width: 18px;
      height: 18px;
      stroke: #7D5555;
      stroke-width: 2;
      fill: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <a class="back" href=" ">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </a >
    <div class="title">世界频道</div>
    <div class="online">42人在线</div>
    <div class="ornament">
      <div class="center-gem"></div>
    </div>
  </div>

  <div class="chat-area" id="chat-area">
    <div class="system-msg">
      <span class="ssr-icon">✦</span> 恭喜「月下蝶」抽到了SSR【星海之约】
    </div>

    <div class="msg other">
      <div class="nickname">云隐</div>
      <div class="bubble">有人一起打副本吗 差一个奶</div>
      <div class="time">18:01</div>
    </div>

    <div class="msg other">
      <div class="nickname">鹿野</div>
      <div class="bubble">刚才那个SSR也太好看了吧</div>
      <div class="time">18:02</div>
    </div>

    <div class="chat-divider">❦ · ✿ · ❦</div>

    <div class="msg self">
      <div class="nickname">珩</div>
      <div class="bubble">今天签到拿了多少</div>
      <div class="time">18:03</div>
    </div>

    <div class="msg other">
      <div class="nickname">云隐</div>
      <div class="bubble">50金币 运气还行</div>
      <div class="time">18:03</div>
    </div>

    <div class="system-msg">
      <span class="ssr-icon">✦</span> 恭喜「霜序」抽到了SSR【深夜来信】
    </div>

    <div class="msg other">
      <div class="nickname">折枝</div>
      <div class="bubble">我的天 又有人出货了 我五十抽一张都没有</div>
      <div class="time">18:05</div>
    </div>

    <div class="msg self">
      <div class="nickname">珩</div>
      <div class="bubble">攒着 保底不会亏</div>
      <div class="time">18:06</div>
    </div>

    <div class="chat-divider">❦ · ✿ · ❦</div>

    <div class="msg other">
      <div class="nickname">晚星</div>
      <div class="bubble">有没有人知道新主线什么时候更新啊</div>
      <div class="time">18:07</div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" placeholder="说点什么...">
    <div class="send-btn">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
    </div>
  </div>
</body>
</html>
