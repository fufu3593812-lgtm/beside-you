<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>情绪碎片 - Beside You</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+SC:wght@200;300;400&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Serif SC', 'PingFang SC', serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
      max-width: 430px;
      margin: 0 auto;
      background: #FFF8F3;
    }

    /* === 背景层 === */
    .bg-layer {
      position: absolute;
      inset: 0;
      z-index: 0;
      transition: background 1s ease;
    }

    .bg-layer.warm {
      background: linear-gradient(180deg, #FFF8F3 0%, #FFEEE6 30%, #FFF0EB 60%, #FFF8F5 100%);
    }

    .bg-layer.cold {
      background: linear-gradient(180deg, #1a1115 0%, #2a1520 30%, #1f1018 60%, #1a1115 100%);
    }

    .bg-ornament {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 300px;
      border-radius: 50%;
      opacity: 0.15;
      pointer-events: none;
    }

    .warm .bg-ornament {
      background: radial-gradient(ellipse, #FFD4B8 0%, transparent 70%);
    }

    .cold .bg-ornament {
      background: radial-gradient(ellipse, #8B2040 0%, transparent 70%);
    }

    .particles {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      opacity: 0;
      animation: float-particle 6s ease-in-out infinite;
    }

    .warm .particle { background: #FFD4A0; }
    .cold .particle { background: #C4667A; }

    @keyframes float-particle {
      0% { opacity: 0; transform: translateY(100vh) scale(0); }
      20% { opacity: 0.8; }
      80% { opacity: 0.6; }
      100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
    }

    /* === 顶部栏 === */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 52px 20px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .back-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
    }

    .back-btn svg {
      width: 18px;
      height: 18px;
      stroke: #9A8080;
      stroke-width: 2;
      fill: none;
    }

    .cold .back-btn svg { stroke: #C4A0A0; }

    .pool-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 300;
      font-style: italic;
      letter-spacing: 1px;
      color: #8D6A5A;
    }

    .cold .pool-title { color: #C4A0A0; }

    .currency {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .currency svg {
      width: 16px;
      height: 16px;
      fill: #D4A06A;
    }

    .currency span {
      font-size: 13px;
      color: #8D6A5A;
      font-weight: 400;
    }

    .cold .currency span { color: #C4A0A0; }

    /* === 卡面展示区 === */
    .card-display {
      position: absolute;
      top: 46%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      width: 280px;
      height: 400px;
      perspective: 1000px;
    }

    .card-frame {
      width: 100%;
      height: 100%;
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 40px rgba(200,160,120,0.2);
      transition: transform 0.6s ease, box-shadow 0.6s ease;
    }

    .cold .card-frame {
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(139,32,64,0.3);
    }

    .card-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-frame::before {
      content: '';
      position: absolute;
      inset: 3px;
      border-radius: 13px;
      border: 1px solid rgba(212,180,140,0.4);
      z-index: 2;
      pointer-events: none;
    }

    .cold .card-frame::before {
      border-color: rgba(196,102,122,0.4);
    }

    .card-frame::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%, rgba(255,255,255,0.05) 100%);
      z-index: 3;
      pointer-events: none;
    }

    .rarity-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 5;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 1px;
      background: linear-gradient(135deg, rgba(212,180,140,0.8), rgba(180,140,100,0.9));
      color: #FFF;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.3);
    }

    .rarity-badge.ssr {
      background: linear-gradient(135deg, #D4A040, #B8860B);
      box-shadow: 0 0 12px rgba(212,160,64,0.5);
    }

    .card-info {
      position: absolute;
      bottom: 148px;
      left: 0;
      right: 0;
      z-index: 20;
      text-align: center;
    }

    .card-name {
      font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
      font-size: 28px;
      font-weight: 300;
      font-style: italic;
      color: #5D4040;
      text-shadow: 0 1px 8px rgba(255,255,255,0.5);
      letter-spacing: 3px;
    }

    .cold .card-name {
      color: #E8C0C8;
      text-shadow: 0 1px 8px rgba(0,0,0,0.5);
    }

    .card-subtitle {
      font-size: 12px;
      color: #A08070;
      margin-top: 6px;
      font-style: italic;
    }

    .cold .card-subtitle { color: #A07080; }

    .star-row {
      margin-top: 8px;
      display: flex;
      justify-content: center;
      gap: 4px;
    }

    .star-row svg {
      width: 14px;
      height: 14px;
      fill: #D4A06A;
    }

    .cold .star-row svg { fill: #C4667A; }

    /* === 抽卡按钮区 === */
    .pull-area {
      position: absolute;
      bottom: 88px;
      left: 16px;
      right: 16px;
      z-index: 50;
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .pull-btn {
      padding: 14px 28px;
      border-radius: 28px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(212,180,140,0.5);
      color: #6D5050;
      font-family: 'Noto Serif SC', serif;
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .cold .pull-btn {
      border-color: rgba(196,102,122,0.5);
      color: #E8C0C8;
    }

    .pull-btn:active {
      transform: scale(0.96);
      box-shadow: 0 0 20px rgba(212,180,140,0.4);
    }

    .cold .pull-btn:active {
      box-shadow: 0 0 20px rgba(196,102,122,0.4);
    }

    .pull-btn .cost {
      display: block;
      font-size: 10px;
      color: #A09080;
      margin-top: 2px;
    }

    .cold .pull-btn .cost { color: #A07080; }

    /* === 卡池切换指示器 === */
    .pool-dots {
      position: absolute;
      bottom: 130px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      gap: 8px;
    }

    .pool-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(160,120,100,0.3);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .pool-dot.active {
      width: 20px;
      border-radius: 3px;
      background: #D4A06A;
    }

    .cold .pool-dot.active { background: #C4667A; }

    /* === 底部导航栏 === */
    .dock {
      position: absolute;
      bottom: 12px;
      left: 16px;
      right: 16px;
      z-index: 60;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .dock-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      border-radius: 20px;
      padding: 12px 4px 10px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.3s ease;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
    }

    .cold .dock-item {
      background: rgba(40, 20, 30, 0.7);
      border-color: rgba(196,102,122,0.2);
    }

    .dock-item:active { transform: scale(0.95); }

    .dock-item.active {
      background: rgba(240, 210, 210, 0.65);
      border-color: rgba(240, 200, 200, 0.5);
    }

    .cold .dock-item.active {
      background: rgba(139, 32, 64, 0.4);
      border-color: rgba(196,102,122,0.5);
    }

    .dock-item svg {
      width: 22px;
      height: 22px;
      stroke: #7D6666;
      stroke-width: 1.6;
      fill: none;
    }

    .cold .dock-item svg { stroke: #C4A0A0; }
    .dock-item.active svg { stroke: #C07070; }
    .cold .dock-item.active svg { stroke: #E8A0B0; }

    .dock-item .d-en { font-size: 8px; color: #8D7676; margin-top: 2px; }
    .dock-item .d-cn { font-size: 8px; color: #B8A8A8; }
    .cold .dock-item .d-en { color: #A08080; }
    .cold .dock-item .d-cn { color: #806060; }

    /* === 信封抽卡动画 === */
    .pull-overlay {
      position: absolute;
      inset: 0;
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: #0a0608;
      opacity: 0;
    }

    .pull-overlay.active {
      display: flex;
      animation: overlay-in 0.8s ease forwards;
    }

    @keyframes overlay-in {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* 信封容器 */
    .envelope-container {
      position: relative;
      width: 300px;
      height: 200px;
      margin-top: 40px;
      cursor: pointer;
    }

    /* 信封主体 */
    .envelope-body {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 300px;
      height: 180px;
      border-radius: 4px 4px 12px 12px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(60px);
      animation: envelope-float-up 1s ease forwards 0.6s;
    }

    .envelope-body.warm-env {
      background: linear-gradient(135deg, #FFF5EE, #FFE8D8);
      border: 1px solid rgba(212,180,140,0.6);
      box-shadow: 0 10px 40px rgba(180,140,100,0.3), 0 0 20px rgba(212,180,140,0.2);
    }

    .envelope-body.cold-env {
      background: linear-gradient(135deg, #2a1a22, #1f1018);
      border: 1px solid rgba(196,102,122,0.4);
      box-shadow: 0 10px 40px rgba(139,32,64,0.3), 0 0 20px rgba(196,102,122,0.2);
    }

    @keyframes envelope-float-up {
      0% { opacity: 0; transform: translateY(60px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* 信封内部装饰线 */
    .envelope-body::before {
      content: '';
      position: absolute;
      inset: 8px;
      border: 1px dashed rgba(180,140,100,0.3);
      border-radius: 8px;
    }

    .cold-env.envelope-body::before {
      border-color: rgba(196,102,122,0.2);
    }

    /* 封口 */
    .envelope-flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 300px;
      height: 100px;
      transform-origin: top center;
      transform: rotateX(0deg);
      transition: transform 1s ease;
      z-index: 5;
    }

    .envelope-flap::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      border-left: 150px solid transparent;
      border-right: 150px solid transparent;
      border-top: 100px solid #FFE8D8;
    }

    .cold-env .envelope-flap::before {
      border-top-color: #2a1a22;
    }

    .envelope-flap.opened {
      transform: rotateX(180deg);
    }

    /* 蜡封印章 */
    .wax-seal {
      position: absolute;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      z-index: 6;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: seal-appear 0.5s ease forwards 1.4s;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .wax-seal.warm-seal {
      background: radial-gradient(circle, #D4A06A, #B8860B);
      box-shadow: 0 2px 12px rgba(180,120,60,0.5);
    }

    .wax-seal.cold-seal {
      background: radial-gradient(circle, #C4667A, #8B2040);
      box-shadow: 0 2px 12px rgba(139,32,64,0.5);
    }

    .wax-seal svg {
      width: 22px;
      height: 22px;
      fill: #FFF;
      opacity: 0.9;
    }

    .wax-seal.broken {
      opacity: 0;
      transform: translateX(-50%) scale(1.5);
    }

    @keyframes seal-appear {
      0% { opacity: 0; transform: translateX(-50%) scale(0.5); }
      100% { opacity: 1; transform: translateX(-50%) scale(1); }
    }

    /* 提示文字 */
    .tap-hint {
      position: absolute;
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #A09080;
      opacity: 0;
      animation: hint-fade 0.6s ease forwards 2s;
      letter-spacing: 1px;
    }

    @keyframes hint-fade {
      0% { opacity: 0; }
      100% { opacity: 0.7; }
    }

    /* 卡面从信封中抽出 */
    .card-pull-out {
      position: absolute;
      width: 220px;
      height: 320px;
      border-radius: 12px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(100px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      z-index: 10;
    }

    .card-pull-out.reveal {
      animation: card-slide-out 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes card-slide-out {
      0% { opacity: 0; transform: translateY(100px) scale(0.9); }
      30% { opacity: 1; }
      100% { opacity: 1; transform: translateY(-60px) scale(1); }
    }

    .card-pull-out img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 卡名显示 */
    .reveal-info {
      position: absolute;
      bottom: 80px;
      left: 0;
      right: 0;
      text-align: center;
      opacity: 0;
      z-index: 15;
    }

    .reveal-info.show {
      animation: info-fade-in 0.8s ease forwards;
    }

    @keyframes info-fade-in {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .reveal-info .r-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 300;
      font-style: italic;
      color: #E8D0C0;
      letter-spacing: 3px;
    }

    .reveal-info .r-subtitle {
      font-size: 12px;
      color: #A09080;
      margin-top: 6px;
      font-style: italic;
    }

    .reveal-info .r-stars {
      margin-top: 8px;
      display: flex;
      justify-content: center;
      gap: 4px;
    }

    .reveal-info .r-stars svg {
      width: 14px;
      height: 14px;
      fill: #D4A06A;
    }

    /* 花瓣 */
    .petal {
      position: absolute;
      width: 12px;
      height: 12px;
      opacity: 0;
      pointer-events: none;
      z-index: 20;
    }

    .petal::before {
      content: '';
      display: block;
      width: 100%;
      height: 100%;
      background: #FFD4C0;
      border-radius: 50% 0 50% 0;
      transform: rotate(45deg);
    }

    .cold-pull .petal::before {
      background: #8B2040;
    }

    .petal.animate {
      animation: petal-fall 3s ease forwards;
    }

    @keyframes petal-fall {
      0% { opacity: 0; transform: translateY(-100px) rotate(0deg); }
      20% { opacity: 0.8; }
      100% { opacity: 0; transform: translateY(100vh) rotate(360deg); }
    }

    /* 确认按钮 */
    .confirm-btn {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 40px;
      border-radius: 24px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(212,180,140,0.4);
      color: #D4B08A;
      font-family: 'Noto Serif SC', serif;
      font-size: 14px;
      letter-spacing: 2px;
      cursor: pointer;
      opacity: 0;
      z-index: 30;
      display: none;
    }

    .confirm-btn.show {
      display: block;
      animation: fade-up 0.6s ease forwards;
    }

    @keyframes fade-up {
      0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
      100% { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .fade-in { opacity: 0; animation: fadeIn 0.8s ease forwards; }
    .delay-1 { animation-delay: 0.15s; }
    .delay-2 { animation-delay: 0.3s; }
    .delay-3 { animation-delay: 0.5s; }
    .delay-4 { animation-delay: 0.7s; }

    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>
<body>

  <div class="bg-layer warm" id="bgLayer">
    <div class="bg-ornament"></div>
  </div>

  <div class="particles" id="particles"></div>

  <div class="top-bar fade-in">
    <a class="back-btn" href="index.html">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </a>
    <div class="pool-title">情绪碎片</div>
    <div class="currency">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v12M6 12h12" stroke="#D4A06A" stroke-width="1.5" fill="none"/></svg>
      <span id="coinCount">1200</span>
    </div>
  </div>

  <div class="card-display fade-in delay-2" id="cardDisplay">
    <div class="card-frame" id="cardFrame">
      <img id="cardImg" src="../assets/gacha/%E6%92%92%E5%A8%87%E5%8D%A1%E9%9D%A2.PNG" alt="撒娇">
      <div class="rarity-badge" id="rarityBadge">SR</div>
    </div>
  </div>

  <div class="card-info fade-in delay-3">
    <div class="card-name" id="cardName">撒娇</div>
    <div class="card-subtitle" id="cardSubtitle">"...你不来，我就一直这样看着你。"</div>
    <div class="star-row" id="starRow">
      <svg viewBox="0 0 24 24"><polygon points="12,2 15,8.5 22,9.3 17,14 18.2,21 12,17.5 5.8,21 7,14 2,9.3 9,8.5"/></svg>
      <svg viewBox="0 0 24 24"><polygon points="12,2 15,8.5 22,9.3 17,14 18.2,21 12,17.5 5.8,21 7,14 2,9.3 9,8.5"/></svg>
      <svg viewBox="0 0 24 24"><polygon points="12,2 15,8.5 22,9.3 17,14 18.2,21 12,17.5 5.8,21 7,14 2,9.3 9,8.5"/></svg>
      <svg viewBox="0 0 24 24"><polygon points="12,2 15,8.5 22,9.3 17,14 18.2,21 12,17.5 5.8,21 7,14 2,9.3 9,8.5"/></svg>
    </div>
  </div>

  <div class="pool-dots fade-in delay-3">
    <div class="pool-dot active" data-index="0"></div>
    <div class="pool-dot" data-index="1"></div>
  </div>

  <div class="pull-area fade-in delay-4">
    <button class="pull-btn" id="pullOne">
      单抽
      <span class="cost">×160</span>
    </button>
    <button class="pull-btn" id="pullTen">
      十连
      <span class="cost">×1600</span>
    </button>
  </div>

  <div class="dock fade-in delay-4">
    <a class="dock-item" href="chat.html">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="d-en">Chat</span>
      <span class="d-cn">聊天</span>
    </a>
    <a class="dock-item" href="wardrobe.html">
      <svg viewBox="0 0 24 24"><path d="M20 21V5a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v16"/><line x1="12" y1="3" x2="12" y2="21"/><line x1="4" y1="21" x2="20" y2="21"/><circle cx="8" cy="10" r="1"/><circle cx="16" cy="10" r="1"/></svg>
      <span class="d-en">Wardrobe</span>
      <span class="d-cn">衣柜</span>
    </a>
    <a class="dock-item" href="index.html">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      <span class="d-en">Home</span>
      <span class="d-cn">主页</span>
    </a>
    <a class="dock-item active" href="gacha.html">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span class="d-en">Heartbeat</span>
      <span class="d-cn">心动</span>
    </a>
    <div class="dock-item">
      <svg viewBox="0 0 24 24"><path d="M6 2L3 7v13a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-3-5z"/><line x1="3" y1="7" x2="21" y2="7"/><path d="M16 11a4 4 0 0 1-8 0"/></svg>
      <span class="d-en">Shop</span>
      <span class="d-cn">商店</span>
    </div>
  </div>

  <!-- 信封抽卡遮罩 -->
  <div class="pull-overlay" id="pullOverlay">
    <div class="envelope-container" id="envelopeContainer">
      <div class="envelope-flap" id="envelopeFlap"></div>
      <div class="wax-seal" id="waxSeal">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </div>
      <div class="envelope-body" id="envelopeBody"></div>
      <div class="tap-hint">轻触拆封</div>
    </div>
    <div class="card-pull-out" id="cardPullOut">
      <img id="revealImg" src="" alt="">
    </div>
    <div class="reveal-info" id="revealInfo">
      <div class="r-name" id="revealName"></div>
      <div class="r-subtitle" id="revealSubtitle"></div>
      <div class="r-stars" id="revealStars"></div>
    </div>
    <button class="confirm-btn" id="confirmBtn">确认</button>
  </div>

  <script>
    const pool = [
      {
        id: 'sajiao',
        name: '撒娇',
        subtitle: '"...你不来，我就一直这样看着你。"',
        rarity: 'SR',
        stars: 4,
        theme: 'warm',
        img: '../assets/gacha/%E6%92%92%E5%A8%87%E5%8D%A1%E9%9D%A2.PNG'
      },
      {
        id: 'shengqi',
        name: '生气',
        subtitle: '"我在等一个解释。"',
        rarity: 'SR',
        stars: 4,
        theme: 'cold',
        img: '../assets/gacha/%E7%94%9F%E6%B0%94%E5%8D%A1%E9%9D%A2.PNG'
      }
    ];

    let currentIndex = 0;
    let envelopeReady = false;
    let currentResult = null;

    const bgLayer = document.getElementById('bgLayer');
    const cardImg = document.getElementById('cardImg');
    const cardName = document.getElementById('cardName');
    const cardSubtitle = document.getElementById('cardSubtitle');
    const rarityBadge = document.getElementById('rarityBadge');
    const starRow = document.getElementById('starRow');
    const pullOverlay = document.getElementById('pullOverlay');
    const envelopeContainer = document.getElementById('envelopeContainer');
    const envelopeFlap = document.getElementById('envelopeFlap');
    const envelopeBody = document.getElementById('envelopeBody');
    const waxSeal = document.getElementById('waxSeal');
    const cardPullOut = document.getElementById('cardPullOut');
    const revealImg = document.getElementById('revealImg');
    const revealInfo = document.getElementById('revealInfo');
    const revealName = document.getElementById('revealName');
    const revealSubtitle = document.getElementById('revealSubtitle');
    const revealStars = document.getElementById('revealStars');
    const confirmBtn = document.getElementById('confirmBtn');
    const poolDots = document.querySelectorAll('.pool-dot');
    const particlesEl = document.getElementById('particles');

    function createParticles() {
      particlesEl.innerHTML = '';
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDelay = (Math.random() * 6) + 's';
        p.style.animationDuration = (4 + Math.random() * 4) + 's';
        particlesEl.appendChild(p);
      }
    }
    createParticles();

    function showCard(index) {
      const card = pool[index];
      currentIndex = index;

      bgLayer.className = 'bg-layer ' + card.theme;
      document.body.style.background = card.theme === 'warm' ? '#FFF8F3' : '#1a1115';

      cardImg.src = card.img;
      cardName.textContent = card.name;
      cardSubtitle.textContent = card.subtitle;
      rarityBadge.textContent = card.rarity;
      rarityBadge.className = 'rarity-badge' + (card.rarity === 'SSR' ? ' ssr' : '');

      let starsHtml = '';
      for (let i = 0; i < card.stars; i++) {
        starsHtml += '<svg viewBox="0 0 24 24"><polygon points="12,2 15,8.5 22,9.3 17,14 18.2,21 12,17.5 5.8,21 7,14 2,9.3 9,8.5"/></svg>';
      }
      starRow.innerHTML = starsHtml;

      poolDots.forEach((d, i) => {
        d.classList.toggle('active', i === index);
      });

      createParticles();
    }

    poolDots.forEach((dot, i) => {
      dot.addEventListener('click', () => showCard(i));
    });

    let touchStartX = 0;
    document.addEventListener('touchstart', e => {
      if (pullOverlay.classList.contains('active')) return;
      touchStartX = e.touches[0].clientX;
    });
    document.addEventListener('touchend', e => {
      if (pullOverlay.classList.contains('active')) return;
      const diff = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(diff) > 60) {
        if (diff < 0 && currentIndex < pool.length - 1) showCard(currentIndex + 1);
        else if (diff > 0 && currentIndex > 0) showCard(currentIndex - 1);
      }
    });

    function resetEnvelope() {
      envelopeFlap.classList.remove('opened');
      envelopeFlap.className = 'envelope-flap';
      envelopeBody.className = 'envelope-body';
      waxSeal.className = 'wax-seal';
      waxSeal.style.animation = '';
      cardPullOut.classList.remove('reveal');
      cardPullOut.style.opacity = '0';
      revealInfo.classList.remove('show');
      confirmBtn.classList.remove('show');
      envelopeReady = false;
      envelopeContainer.style.display = 'block';
    }

    function doPull(count) {
      currentResult = pool[Math.floor(Math.random() * pool.length)];
      revealImg.src = currentResult.img;

      resetEnvelope();

      // 设置信封主题
      const isWarm = currentResult.theme === 'warm';
      envelopeBody.classList.add(isWarm ? 'warm-env' : 'cold-env');
      envelopeFlap.classList.add(isWarm ? 'warm-env' : 'cold-env');
      waxSeal.classList.add(isWarm ? 'warm-seal' : 'cold-seal');

      pullOverlay.className = 'pull-overlay active' + (isWarm ? '' : ' cold-pull');

      // 信封浮起后可点击
      setTimeout(() => { envelopeReady = true; }, 2000);
    }

    function openEnvelope() {
      if (!envelopeReady) return;
      envelopeReady = false;

      // 蜡封碎裂
      waxSeal.classList.add('broken');

      // 封口翻开
      setTimeout(() => {
        envelopeFlap.classList.add('opened');
      }, 300);

      // 信封隐藏 + 卡面抽出
      setTimeout(() => {
        envelopeContainer.style.display = 'none';
        cardPullOut.classList.add('reveal');

        // 花瓣
        for (let i = 0; i < 15; i++) {
          const petal = document.createElement('div');
          petal.className = 'petal';
          petal.style.left = Math.random() * 100 + '%';
          petal.style.top = '-20px';
          pullOverlay.appendChild(petal);
          setTimeout(() => petal.classList.add('animate'), Math.random() * 600);
          setTimeout(() => petal.remove(), 4000);
        }
      }, 800);

      // 卡名信息
      setTimeout(() => {
        revealName.textContent = currentResult.name;
        revealSubtitle.textContent = currentResult.subtitle;
        let starsHtml = '';
        for (let i = 0; i < currentResult.stars; i++) {
          starsHtml += '<svg viewBox="0 0 24 24"><polygon points="12,2 15,8.5 22,9.3 17,14 18.2,21 12,17.5 5.8,21 7,14 2,9.3 9,8.5"/></svg>';
        }
        revealStars.innerHTML = starsHtml;
        revealInfo.classList.add('show');
      }, 1800);

      // 确认按钮
      setTimeout(() => {
        confirmBtn.classList.add('show');
      }, 2400);
    }

    envelopeContainer.addEventListener('click', openEnvelope);

    document.getElementById('pullOne').addEventListener('click', () => doPull(1));
    document.getElementById('pullTen').addEventListener('click', () => doPull(10));

    confirmBtn.addEventListener('click', () => {
      pullOverlay.className = 'pull-overlay';
      pullOverlay.querySelectorAll('.petal').forEach(p => p.remove());
    });
  </script>
</body>
</html>
