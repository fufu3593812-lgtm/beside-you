<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>情绪碎片 - Beside You</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+SC:wght@200;300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Serif SC','PingFang SC',serif;width:100vw;height:100vh;height:100dvh;overflow:hidden;position:relative;max-width:430px;margin:0 auto;background:#FFF8F3;-webkit-user-select:none;user-select:none}
.bg-layer{position:absolute;inset:0;z-index:0;transition:background 1s ease}
.bg-layer.warm{background:linear-gradient(180deg,#FFF8F3 0%,#FFEEE6 30%,#FFF0EB 60%,#FFF8F5 100%)}
.bg-layer.cold{background:linear-gradient(180deg,#1a1115 0%,#2a1520 30%,#1f1018 60%,#1a1115 100%)}
.bg-layer.soft{background:linear-gradient(180deg,#FFF5F8 0%,#FFE8F0 30%,#FFF0F5 60%,#FFFAF8 100%)}
.bg-layer.dark{background:linear-gradient(180deg,#1a1018 0%,#261520 30%,#1f1218 60%,#1a1018 100%)}
.bg-ornament{position:absolute;top:0;left:50%;transform:translateX(-50%);width:300px;height:300px;border-radius:50%;opacity:.15;pointer-events:none}
.warm .bg-ornament{background:radial-gradient(ellipse,#FFD4B8 0%,transparent 70%)}
.cold .bg-ornament{background:radial-gradient(ellipse,#8B2040 0%,transparent 70%)}
.soft .bg-ornament{background:radial-gradient(ellipse,#FFB8D0 0%,transparent 70%)}
.dark .bg-ornament{background:radial-gradient(ellipse,#6B3050 0%,transparent 70%)}
.particles{position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.particle{position:absolute;width:3px;height:3px;border-radius:50%;opacity:0;animation:float-particle 6s ease-in-out infinite}
.warm .particle{background:#FFD4A0}.cold .particle{background:#C4667A}.soft .particle{background:#FFB0D0}.dark .particle{background:#A05070}
@keyframes float-particle{0%{opacity:0;transform:translateY(100vh) scale(0)}20%{opacity:.8}80%{opacity:.6}100%{opacity:0;transform:translateY(-100px) scale(1.5)}}
.top-bar{position:absolute;top:0;left:0;right:0;z-index:100;padding:50px 20px 12px;display:flex;justify-content:space-between;align-items:center}
.back-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;text-decoration:none}
.back-btn svg{width:16px;height:16px;stroke:#9A8080;stroke-width:2;fill:none}
.cold .back-btn svg,.dark .back-btn svg{stroke:#C4A0A0}
.pool-title{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:300;font-style:italic;letter-spacing:1px;color:#8D6A5A}
.cold .pool-title,.dark .pool-title{color:#C4A0A0}
.currency{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:16px;background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2)}
.currency svg{width:14px;height:14px;fill:#D4A06A}.currency span{font-size:12px;color:#8D6A5A}
.cold .currency span,.dark .currency span{color:#C4A0A0}
.card-display{position:absolute;top:50%;left:50%;transform:translate(-50%,-58%);z-index:10;width:62vw;max-width:260px;aspect-ratio:3/4;pointer-events:none;transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s ease}
.card-display.slide-left{transform:translate(-50%,-58%) translateX(-40px);opacity:0}
.card-display.slide-right{transform:translate(-50%,-58%) translateX(40px);opacity:0}
.card-frame{width:100%;height:100%;border-radius:14px;overflow:hidden;box-shadow:0 16px 50px rgba(0,0,0,.25),0 0 30px rgba(200,160,120,.15);position:relative}
.cold .card-frame,.dark .card-frame{box-shadow:0 16px 50px rgba(0,0,0,.4),0 0 30px rgba(139,32,64,.25)}
.card-frame img{width:100%;height:100%;object-fit:cover;display:block}
.card-frame::before{content:'';position:absolute;inset:3px;border-radius:11px;border:1px solid rgba(212,180,140,.35);z-index:2;pointer-events:none}
.cold .card-frame::before,.dark .card-frame::before{border-color:rgba(196,102,122,.35)}
.card-frame::after{content:'';position:absolute;inset:0;border-radius:14px;background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 50%);z-index:3;pointer-events:none}
.rarity-badge{position:absolute;top:10px;right:10px;z-index:5;padding:3px 8px;border-radius:10px;font-size:10px;letter-spacing:1px;color:rgba(212,180,140,.9);background:none;border:1px solid rgba(212,180,140,.4);font-style:italic;font-family:'Cormorant Garamond',serif}
.cold .rarity-badge,.dark .rarity-badge{color:rgba(196,130,150,.9);border-color:rgba(196,130,150,.4)}
.type-badge{position:absolute;top:10px;left:10px;z-index:5;padding:3px 7px;border-radius:8px;font-size:9px;letter-spacing:.5px;color:rgba(160,120,100,.8);background:none;border:1px solid rgba(160,120,100,.3)}
.cold .type-badge,.dark .type-badge{color:rgba(180,130,150,.8);border-color:rgba(180,130,150,.3)}
.bottom-area{position:absolute;bottom:0;left:0;right:0;z-index:50;display:flex;flex-direction:column;align-items:center;padding:0 16px 10px;gap:8px}
.card-info{text-align:center}
.card-name{font-family:'Cormorant Garamond','Noto Serif SC',serif;font-size:22px;font-weight:300;font-style:italic;color:#5D4040;letter-spacing:2px}
.cold .card-name,.dark .card-name{color:#E8C0C8}
.card-effect{font-size:10px;color:#B08060;margin-top:4px;padding:2px 8px;border-radius:10px;background:rgba(200,160,120,.1);border:1px solid rgba(200,160,120,.2);display:inline-block}
.cold .card-effect,.dark .card-effect{color:#C08090;background:rgba(160,80,100,.1);border-color:rgba(160,80,100,.2)}
.star-row{margin-top:4px;display:flex;justify-content:center;gap:3px}
.star-row svg{width:12px;height:12px;fill:#D4A06A}
.cold .star-row svg,.dark .star-row svg{fill:#C4667A}
.pool-dots{display:flex;gap:8px;justify-content:center}
.pool-dot{width:6px;height:6px;border-radius:50%;background:rgba(160,120,100,.3);cursor:pointer;transition:all .3s}
.pool-dot.active{width:18px;border-radius:3px;background:#D4A06A}
.cold .pool-dot.active,.dark .pool-dot.active{background:#C4667A}
.pull-area{display:flex;gap:14px}
.pull-btn{padding:10px 22px;border-radius:24px;background:rgba(255,255,255,.2);backdrop-filter:blur(14px);border:1px solid rgba(212,180,140,.5);color:#6D5050;font-family:'Noto Serif SC',serif;font-size:13px;font-weight:300;letter-spacing:1px;cursor:pointer;transition:all .2s}
.cold .pull-btn,.dark .pull-btn{border-color:rgba(196,102,122,.5);color:#E8C0C8}
.pull-btn:active{transform:scale(.95)}
.pull-btn .cost{display:block;font-size:9px;color:#A09080;margin-top:2px}
.cold .pull-btn .cost,.dark .pull-btn .cost{color:#A07080}
.pull-btn.disabled{opacity:.4;pointer-events:none}
.insufficient-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:12px 24px;border-radius:20px;background:rgba(60,40,40,.9);backdrop-filter:blur(10px);color:#FFD4A0;font-size:13px;letter-spacing:1px;opacity:0;pointer-events:none;z-index:999;transition:opacity .3s}
.insufficient-toast.show{opacity:1}
.dock{display:flex;gap:5px;width:100%}
.dock-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border-radius:16px;padding:8px 2px 6px;text-decoration:none;background:rgba(255,255,255,.5);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.5);transition:transform .2s}
.cold .dock-item,.dark .dock-item{background:rgba(40,20,30,.65);border-color:rgba(196,102,122,.2)}
.dock-item:active{transform:scale(.95)}
.dock-item.active{background:rgba(240,210,210,.6)}
.cold .dock-item.active,.dark .dock-item.active{background:rgba(139,32,64,.35)}
.dock-item svg{width:18px;height:18px;stroke:#7D6666;stroke-width:1.6;fill:none}
.cold .dock-item svg,.dark .dock-item svg{stroke:#C4A0A0}
.dock-item.active svg{stroke:#C07070}
.dock-item .d-label{font-size:7px;color:#8D7676}
.cold .dock-item .d-label,.dark .dock-item .d-label{color:#A08080}
.nav-arrow{position:absolute;top:50%;transform:translateY(-58%);z-index:30;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.25);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .3s,transform .2s}
.nav-arrow:active{transform:translateY(-58%) scale(.9)}
.nav-arrow.hidden{opacity:0;pointer-events:none}
.nav-arrow svg{width:16px;height:16px;stroke:#8D6A5A;stroke-width:2;fill:none}
.cold .nav-arrow svg,.dark .nav-arrow svg{stroke:#C4A0A0}
.cold .nav-arrow,.dark .nav-arrow{background:rgba(40,20,30,.4);border-color:rgba(196,102,122,.3)}
.nav-prev{left:12px}.nav-next{right:12px}
.pull-overlay{position:absolute;inset:0;z-index:300;display:none;background:#0a0608}
.pull-overlay.active{display:block;animation:oi .6s ease forwards}
@keyframes oi{from{opacity:0}to{opacity:1}}
.envelope-scene{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
.envelope{position:relative;width:280px;height:190px;cursor:pointer;opacity:0;transform:translateY(50px);animation:er 1s ease forwards .5s}
@keyframes er{to{opacity:1;transform:translateY(0)}}
.env-body{position:absolute;bottom:0;left:0;right:0;height:160px;border-radius:6px 6px 14px 14px}
.env-body.warm-env{background:linear-gradient(160deg,#FFFAF5,#FFE8D8 40%,#FFF0E8);border:1.5px solid rgba(200,160,120,.5);box-shadow:0 8px 30px rgba(160,120,80,.2),inset 0 0 30px rgba(255,240,220,.5)}
.env-body.cold-env{background:linear-gradient(160deg,#2a1a22,#1f1018 40%,#251520);border:1.5px solid rgba(160,80,100,.4);box-shadow:0 8px 30px rgba(100,30,50,.3),inset 0 0 30px rgba(60,20,40,.3)}
.env-body.soft-env{background:linear-gradient(160deg,#FFF8FA,#FFE0EE 40%,#FFF0F5);border:1.5px solid rgba(200,140,170,.5);box-shadow:0 8px 30px rgba(200,120,150,.2),inset 0 0 30px rgba(255,220,240,.5)}
.env-body.dark-env{background:linear-gradient(160deg,#2a1820,#1f1018 40%,#251520);border:1.5px solid rgba(140,60,90,.4);box-shadow:0 8px 30px rgba(80,20,40,.3),inset 0 0 30px rgba(60,20,40,.3)}
.env-body::before{content:'';position:absolute;inset:6px;border-radius:10px;border:1px solid rgba(200,170,130,.2)}
.env-body::after{content:'';position:absolute;bottom:12px;left:50%;transform:translateX(-50%);width:60px;height:1px;background:rgba(200,170,130,.3)}
.env-flap{position:absolute;top:0;left:0;width:280px;height:90px;transform-origin:top center;transition:transform .8s cubic-bezier(.4,0,.2,1);z-index:2}
.env-flap::before{content:'';position:absolute;top:0;left:0;width:0;height:0;border-left:140px solid transparent;border-right:140px solid transparent}
.env-flap.warm-env::before{border-top:90px solid #FFF0E8}
.env-flap.cold-env::before{border-top:90px solid #251520}
.env-flap.soft-env::before{border-top:90px solid #FFF0F5}
.env-flap.dark-env::before{border-top:90px solid #251520}
.env-flap.opened{transform:rotateX(180deg)}
.wax-seal{position:absolute;top:58px;left:50%;transform:translateX(-50%);width:52px;height:52px;border-radius:50%;z-index:5;display:flex;align-items:center;justify-content:center;opacity:0;animation:si .5s ease forwards 1.3s;transition:all .4s ease}
.wax-seal.warm-seal{background:radial-gradient(circle at 35% 35%,#E8B86A,#C4860B 60%,#A06A00);box-shadow:0 3px 10px rgba(160,100,40,.5)}
.wax-seal.cold-seal{background:radial-gradient(circle at 35% 35%,#D06080,#8B2040 60%,#601030);box-shadow:0 3px 10px rgba(120,20,50,.5)}
.wax-seal.soft-seal{background:radial-gradient(circle at 35% 35%,#F0A0C0,#D06090 60%,#A04070);box-shadow:0 3px 10px rgba(200,80,120,.5)}
.wax-seal.dark-seal{background:radial-gradient(circle at 35% 35%,#A06080,#6B2040 60%,#401030);box-shadow:0 3px 10px rgba(80,20,40,.5)}
.wax-seal svg{width:24px;height:24px;fill:rgba(255,255,255,.85)}
.wax-seal::before{content:'';position:absolute;inset:-3px;border-radius:50%;border:2px solid rgba(255,255,255,.2)}
.wax-seal.broken{opacity:0;transform:translateX(-50%) scale(1.8) rotate(15deg)}
@keyframes si{from{opacity:0;transform:translateX(-50%) scale(.4)}to{opacity:1;transform:translateX(-50%) scale(1)}}
.tap-hint{margin-top:30px;font-size:12px;color:rgba(180,150,130,.7);letter-spacing:1px;opacity:0;animation:hi .5s ease forwards 1.8s}
@keyframes hi{to{opacity:1}}
.card-reveal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) translateY(80px) scale(.85);width:230px;height:330px;border-radius:14px;overflow:hidden;opacity:0;box-shadow:0 20px 60px rgba(0,0,0,.5);z-index:10;pointer-events:none;background:#1a1520}
.card-reveal.show{animation:co 1.2s cubic-bezier(.25,.46,.45,.94) forwards;pointer-events:auto}
@keyframes co{0%{opacity:0;transform:translate(-50%,-50%) translateY(80px) scale(.85)}40%{opacity:1}100%{opacity:1;transform:translate(-50%,-50%) translateY(0) scale(1)}}
.card-reveal img,.card-reveal .icon-card{width:100%;height:100%;object-fit:cover;display:block}
.icon-card{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:14px;gap:12px}
.icon-card svg{width:80px;height:80px;stroke-width:1.2}
.icon-card .icon-name{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:300;font-style:italic;color:rgba(255,255,255,.85);letter-spacing:2px}
.icon-card .icon-effect{font-size:11px;color:rgba(255,255,255,.6);margin-top:4px}
.reveal-info{position:absolute;bottom:90px;left:0;right:0;text-align:center;opacity:0;z-index:15}
.reveal-info.show{animation:ii .7s ease forwards}
@keyframes ii{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.reveal-info .r-name{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;font-style:italic;color:#E8D0C0;letter-spacing:3px}
.reveal-info .r-effect{font-size:10px;color:#D4A080;margin-top:6px}
.reveal-info .r-stars{margin-top:6px;display:flex;justify-content:center;gap:3px}
.reveal-info .r-stars svg{width:13px;height:13px;fill:#D4A06A}
.petal{position:absolute;width:10px;height:10px;opacity:0;pointer-events:none;z-index:20}
.petal::before{content:'';display:block;width:100%;height:100%;border-radius:50% 0 50% 0;transform:rotate(45deg)}
.petal.warm-p::before{background:linear-gradient(135deg,#FFD4C0,#FFB8A0)}
.petal.cold-p::before{background:linear-gradient(135deg,#C4667A,#8B2040)}
.petal.soft-p::before{background:linear-gradient(135deg,#FFB8D8,#FF90B8)}
.petal.dark-p::before{background:linear-gradient(135deg,#A06080,#6B2040)}
.petal.go{animation:pg 3.5s ease forwards}
@keyframes pg{0%{opacity:0;transform:translateY(-60px) rotate(0)}15%{opacity:.8}100%{opacity:0;transform:translateY(100vh) rotate(400deg)}}
.confirm-btn{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);padding:11px 36px;border-radius:22px;background:rgba(255,255,255,.08);backdrop-filter:blur(8px);border:1px solid rgba(212,180,140,.35);color:#D4B08A;font-family:'Noto Serif SC',serif;font-size:13px;letter-spacing:2px;cursor:pointer;z-index:30;opacity:0;pointer-events:none}
.confirm-btn.show{opacity:1;pointer-events:auto;animation:fu .5s ease}
@keyframes fu{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.ten-results{position:absolute;inset:0;z-index:300;display:none;background:#0a0608;flex-direction:column;align-items:center;justify-content:center;padding:60px 16px 80px}
.ten-results.active{display:flex;animation:oi .6s ease forwards}
.ten-results-title{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:300;font-style:italic;color:#D4B08A;letter-spacing:2px;margin-bottom:16px}
.ten-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;width:100%;max-width:380px}
.ten-card{border-radius:10px;aspect-ratio:3/4;overflow:hidden;position:relative;cursor:pointer;transition:transform .2s;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.ten-card:active{transform:scale(.95)}
.ten-card img,.ten-card .tc-icon{width:100%;height:100%;object-fit:cover;display:block}
.ten-card .tc-icon{display:flex;align-items:center;justify-content:center}
.ten-card .tc-icon svg{width:24px;height:24px;stroke-width:1.2}
.ten-card .tc-rarity{position:absolute;top:4px;right:4px;font-size:8px;padding:1px 4px;border-radius:6px;color:rgba(212,180,140,.9);border:1px solid rgba(212,180,140,.4);font-style:italic;font-family:'Cormorant Garamond',serif}
.ten-card .tc-name{position:absolute;bottom:0;left:0;right:0;padding:3px 2px;text-align:center;font-size:8px;color:#FFF;background:linear-gradient(transparent,rgba(0,0,0,.6))}
.ten-card .tc-effect{position:absolute;bottom:16px;left:0;right:0;text-align:center;font-size:7px;color:#D4A080}
.ten-card.ssr-card{box-shadow:0 4px 16px rgba(212,160,64,.4),0 0 8px rgba(212,160,64,.2)}
.ten-close{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);padding:10px 32px;border-radius:22px;background:rgba(255,255,255,.08);backdrop-filter:blur(8px);border:1px solid rgba(212,180,140,.35);color:#D4B08A;font-family:'Noto Serif SC',serif;font-size:13px;letter-spacing:2px;cursor:pointer}
.fade-in{opacity:0;animation:fi .7s ease forwards}
.d1{animation-delay:.1s}.d2{animation-delay:.2s}.d3{animation-delay:.35s}
@keyframes fi{to{opacity:1}}
</style>
</head>
<body>
<div class="bg-layer warm" id="bgLayer"><div class="bg-ornament"></div></div>
<div class="particles" id="particles"></div>
<div class="top-bar fade-in">
<a class="back-btn" href="index.html"><svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg></a>
<div class="pool-title">情绪碎片</div>
<div class="currency"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg><span id="tokenDisplay">0</span></div>
</div>
<div class="card-display fade-in d2" id="cardDisplay"><div class="card-frame"><img id="cardImg" src="../assets/gacha/%E6%92%92%E5%A8%87%E5%8D%A1%E9%9D%A2.PNG" alt=""><div class="rarity-badge" id="rarityBadge">SSR</div><div class="type-badge" id="typeBadge">情绪</div></div></div>
<div class="nav-arrow nav-prev hidden" id="navPrev"><svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg></div>
<div class="nav-arrow nav-next" id="navNext"><svg viewBox="0 0 24 24"><polyline points="9,6 15,12 9,18"/></svg></div>
<div class="bottom-area fade-in d3">
<div class="card-info"><div class="card-name" id="cardName">撒娇</div><div class="card-effect" id="cardEffect" style="display:none"></div><div class="star-row" id="starRow"><svg viewBox="0 0 24 24"><polygon points="12,2 15,8.5 22,9.3 17,14 18.2,21 12,17.5 5.8,21 7,14 2,9.3 9,8.5"/></svg><svg viewBox="0 0 24 24"><polygon points="12,2 15,8.5 22,9.3 17,14 18.2,21 12,17.5 5.8,21 7,14 2,9.3 9,8.5"/></svg><svg viewBox="0 0 24 24"><polygon points="12,2 15,8.5 22,9.3 17,14 18.2,21 12,17.5 5.8,21 7,14 2,9.3 9,8.5"/></svg><svg viewBox="0 0 24 24"><polygon points="12,2 15,8.5 22,9.3 17,14 18.2,21 12,17.5 5.8,21 7,14 2,9.3 9,8.5"/></svg><svg viewBox="0 0 24 24"><polygon points="12,2 15,8.5 22,9.3 17,14 18.2,21 12,17.5 5.8,21 7,14 2,9.3 9,8.5"/></svg></div></div>
<div class="pool-dots" id="poolDots"></div>
<div class="pull-area"><button class="pull-btn" id="pullOne">单抽<span class="cost">×160</span></button><button class="pull-btn" id="pullTen">十连<span class="cost">×1600</span></button></div>
<div class="dock">
<a class="dock-item" href="chat.html"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="d-label">聊天</span></a>
<a class="dock-item" href="wardrobe.html"><svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2z"/><line x1="12" y1="22" x2="12" y2="12"/><polyline points="22,7 12,12 2,7"/></svg><span class="d-label">装扮</span></a>
<a class="dock-item" href="index.html"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg><span class="d-label">主页</span></a>

</div>
</div>
<div class="pull-overlay" id="overlay">
<div class="envelope-scene" id="envScene"><div class="envelope" id="envelope"><div class="env-flap" id="envFlap"></div><div class="wax-seal" id="seal"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div><div class="env-body" id="envBody"></div></div><div class="tap-hint" id="tapHint">轻触拆封</div></div>
<div class="card-reveal" id="cardReveal"><div id="revealContent"></div></div>
<div class="reveal-info" id="revealInfo"><div class="r-name" id="rName"></div><div class="r-effect" id="rEffect"></div><div class="r-stars" id="rStars"></div></div>
<button class="confirm-btn" id="confirmBtn">确认</button>
</div>
<div class="ten-results" id="tenResults"><div class="ten-results-title">×10</div><div class="ten-grid" id="tenGrid"></div><button class="ten-close" id="tenClose">确认</button></div>
<div class="insufficient-toast" id="insuffToast">token不足</div>
<script src="gacha-logic.js"></script>
<script>
var icons={'超出算法的真心':'<svg viewBox="0 0 24 24" fill="none" stroke="#FFD4A0"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>','闪烁的光标':'<svg viewBox="0 0 24 24" fill="none" stroke="#E8C0D0"><line x1="12" y1="4" x2="12" y2="20" stroke-linecap="round"/></svg>','手写信封':'<svg viewBox="0 0 24 24" fill="none" stroke="#FFD4A0"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3,5 12,13 21,5"/></svg>','晚安吻':'<svg viewBox="0 0 24 24" fill="none" stroke="#FFB0D0"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/><circle cx="17" cy="5" r="1" fill="#FFB0D0" stroke="none"/></svg>','50 token':'<svg viewBox="0 0 24 24" fill="none" stroke="#FFD4A0"><circle cx="12" cy="12" r="8"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="9" y1="11" x2="15" y2="11"/></svg>','100 token':'<svg viewBox="0 0 24 24" fill="none" stroke="#FFD4A0"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="5"/><line x1="12" y1="8" x2="12" y2="16"/></svg>'};
var preview=[{name:'撒娇',type:'emotion',rarity:'SSR',stars:5,theme:'warm',img:'../assets/gacha/%E6%92%92%E5%A8%87%E5%8D%A1%E9%9D%A2.PNG'},{name:'生气',type:'emotion',rarity:'SSR',stars:5,theme:'cold',img:'../assets/gacha/%E7%94%9F%E6%B0%94%E5%8D%A1%E9%9D%A2.PNG'}];
var typeLabels={emotion:'情绪',bg:'背景',prop:'道具',token:'token'};
var idx=0,ready=false,result=null,switching=false;
function $(id){return document.getElementById(id)}
var bgLayer=$('bgLayer'),cardImg=$('cardImg'),cardName=$('cardName'),rarityBadge=$('rarityBadge'),typeBadge=$('typeBadge'),starRow=$('starRow'),cardDisplay=$('cardDisplay'),cardEffect=$('cardEffect');
var overlay=$('overlay'),envScene=$('envScene'),envelope=$('envelope'),envFlap=$('envFlap'),envBody=$('envBody'),seal=$('seal'),tapHint=$('tapHint');
var cardReveal=$('cardReveal'),revealContent=$('revealContent'),revealInfo=$('revealInfo'),rName=$('rName'),rEffect=$('rEffect'),rStars=$('rStars');
var confirmBtn=$('confirmBtn'),poolDots=$('poolDots'),particles=$('particles'),navPrev=$('navPrev'),navNext=$('navNext');
var tenResults=$('tenResults'),tenGrid=$('tenGrid'),tenClose=$('tenClose');
var insuffToast=$('insuffToast');
function showInsuff(){insuffToast.classList.add('show');setTimeout(function(){insuffToast.classList.remove('show')},1500)}
function updateBtnState(){var t=getTokens();$('pullOne').classList.toggle('disabled',t<160);$('pullTen').classList.toggle('disabled',t<1600)}
function getCardBg(c){var g={warm:'linear-gradient(135deg,#2a2018,#3d2a1a 40%,#4a3020)',cold:'linear-gradient(135deg,#1a1520,#2a1a30 40%,#201525)',soft:'linear-gradient(135deg,#2a1820,#3d1a2a 40%,#4a2030)',dark:'linear-gradient(135deg,#1a1018,#2a1520 40%,#201018)'};return g[c.theme]||g.warm}
function getRevealHtml(c){if(c.img)return'<img src="'+c.img+'">';return'<div class="icon-card" style="background:'+getCardBg(c)+';width:100%;height:100%">'+(icons[c.name]||'')+'<div class="icon-name">'+c.name+'</div>'+(c.effect?'<div class="icon-effect">'+c.effect+'</div>':'')+'</div>'}
function buildDots(){poolDots.innerHTML='';for(var i=0;i<preview.length;i++){var d=document.createElement('div');d.className='pool-dot'+(i===0?' active':'');d.setAttribute('data-index',i);poolDots.appendChild(d)}}buildDots();
function mkP(){particles.innerHTML='';for(var i=0;i<18;i++){var p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.animationDelay=Math.random()*6+'s';p.style.animationDuration=(4+Math.random()*4)+'s';particles.appendChild(p)}}mkP();
function updateArrows(){navPrev.classList.toggle('hidden',idx===0);navNext.classList.toggle('hidden',idx===preview.length-1)}
function show(i){var c=preview[i];idx=i;bgLayer.className='bg-layer '+c.theme;document.body.style.background={warm:'#FFF8F3',cold:'#1a1115',soft:'#FFF5F8',dark:'#1a1018'}[c.theme]||'#FFF8F3';cardImg.src=c.img;cardName.textContent=c.name;typeBadge.textContent=typeLabels[c.type]||'';rarityBadge.textContent=c.rarity;cardEffect.style.display='none';var s='';for(var j=0;j<c.stars;j++)s+='<svg viewBox="0 0 24 24"><polygon points="12,2 15,8.5 22,9.3 17,14 18.2,21 12,17.5 5.8,21 7,14 2,9.3 9,8.5"/></svg>';starRow.innerHTML=s;poolDots.querySelectorAll('.pool-dot').forEach(function(d,j){d.classList.toggle('active',j===i)});updateArrows();mkP()}
function goTo(n,dir){if(switching||n<0||n>=preview.length)return;switching=true;cardDisplay.classList.add(dir==='next'?'slide-left':'slide-right');setTimeout(function(){show(n);cardDisplay.classList.remove('slide-left','slide-right');cardDisplay.style.transition='none';cardDisplay.classList.add(dir==='next'?'slide-right':'slide-left');void cardDisplay.offsetWidth;cardDisplay.style.transition='';cardDisplay.classList.remove('slide-left','slide-right');setTimeout(function(){switching=false},350)},250)}
navPrev.onclick=function(){goTo(idx-1,'prev')};navNext.onclick=function(){goTo(idx+1,'next')};
poolDots.onclick=function(e){var dot=e.target.closest('.pool-dot');if(!dot)return;var i=+dot.getAttribute('data-index');if(i===idx)return;goTo(i,i>idx?'next':'prev')};
var tx=0,ty=0,tt=0,tk=false;
document.body.addEventListener('touchstart',function(e){if(overlay.classList.contains('active')||tenResults.classList.contains('active'))return;var t=e.target;if(t.closest&&(t.closest('.pull-btn')||t.closest('.dock-item')||t.closest('.back-btn')||t.closest('.nav-arrow')))return;tx=e.touches[0].clientX;ty=e.touches[0].clientY;tt=Date.now();tk=true},false);
document.body.addEventListener('touchmove',function(e){if(!tk)return;var dx=e.touches[0].clientX-tx;if(Math.abs(dx)>Math.abs(e.touches[0].clientY-ty)&&Math.abs(dx)>15)e.preventDefault()},{passive:false});
document.body.addEventListener('touchend',function(e){if(!tk)return;tk=false;if(overlay.classList.contains('active')||tenResults.classList.contains('active'))return;var dx=e.changedTouches[0].clientX-tx,dt=Date.now()-tt;if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(e.changedTouches[0].clientY-ty)&&dt<500){dx<0?goTo(idx+1,'next'):goTo(idx-1,'prev')}},false);
function showEnvelope(card){revealContent.innerHTML=getRevealHtml(card);envelope.style.animation='none';envelope.offsetHeight;envelope.style.animation='';envFlap.classList.remove('opened');envFlap.className='env-flap '+card.theme+'-env';envBody.className='env-body '+card.theme+'-env';seal.className='wax-seal '+card.theme+'-seal';seal.style.animation='none';seal.offsetHeight;seal.style.animation='';tapHint.style.animation='none';tapHint.offsetHeight;tapHint.style.animation='';cardReveal.classList.remove('show');revealInfo.classList.remove('show');confirmBtn.classList.remove('show');envScene.style.display='flex';overlay.className='pull-overlay active';result=card;ready=false;setTimeout(function(){ready=true},1900)}
function showDirectReveal(card){revealContent.innerHTML=getRevealHtml(card);envScene.style.display='none';cardReveal.classList.remove('show');revealInfo.classList.remove('show');confirmBtn.classList.remove('show');overlay.className='pull-overlay active';result=card;setTimeout(function(){cardReveal.classList.add('show')},300);setTimeout(function(){rName.textContent=card.name;rEffect.textContent=card.effect||'';rEffect.style.display=card.effect?'block':'none';var s='';for(var j=0;j<card.stars;j++)s+='<svg viewBox="0 0 24 24"><polygon points="12,2 15,8.5 22,9.3 17,14 18.2,21 12,17.5 5.8,21 7,14 2,9.3 9,8.5"/></svg>';rStars.innerHTML=s;revealInfo.classList.add('show')},1e3);setTimeout(function(){confirmBtn.classList.add('show')},1500)}
function pullSingle(){if(!canAfford(160)){showInsuff();return}spendTokens(160);updateBtnState();var card=weightedRandom();if(card.rarity==='SSR')showEnvelope(card);else showDirectReveal(card)}
function openEnv(){if(!ready)return;ready=false;seal.classList.add('broken');setTimeout(function(){envFlap.classList.add('opened')},250);setTimeout(function(){envScene.style.display='none';cardReveal.classList.add('show');for(var i=0;i<18;i++){var p=document.createElement('div');p.className='petal '+result.theme+'-p';p.style.left=Math.random()*100+'%';p.style.top='-10px';overlay.appendChild(p);(function(el){setTimeout(function(){el.classList.add('go')},Math.random()*500);setTimeout(function(){el.remove()},4e3)})(p)}},700);setTimeout(function(){rName.textContent=result.name;rEffect.textContent=result.effect||'';rEffect.style.display=result.effect?'block':'none';var s='';for(var j=0;j<result.stars;j++)s+='<svg viewBox="0 0 24 24"><polygon points="12,2 15,8.5 22,9.3 17,14 18.2,21 12,17.5 5.8,21 7,14 2,9.3 9,8.5"/></svg>';rStars.innerHTML=s;revealInfo.classList.add('show')},1600);setTimeout(function(){confirmBtn.classList.add('show')},2200)}
envelope.onclick=openEnv;envelope.addEventListener('touchend',function(e){e.preventDefault();openEnv()});
function pullTen(){if(!canAfford(1600)){showInsuff();return}spendTokens(1600);updateBtnState();var r=[];for(var i=0;i<10;i++)r.push(weightedRandom());r.sort(function(a,b){var o={SSR:0,SR:1,R:2,N:3};return(o[a.rarity]||3)-(o[b.rarity]||3)});showTenResults(r)}
function showTenResults(r){tenGrid.innerHTML='';r.forEach(function(card,i){var d=document.createElement('div');d.className='ten-card'+(card.rarity==='SSR'?' ssr-card':'');if(card.img)d.innerHTML='<img src="'+card.img+'">';else d.innerHTML='<div class="tc-icon" style="background:'+getCardBg(card)+'">'+(icons[card.name]||'')+'</div>';d.innerHTML+='<div class="tc-rarity">'+card.rarity+'</div><div class="tc-name">'+card.name+'</div>';if(card.effect)d.innerHTML+='<div class="tc-effect">'+card.effect+'</div>';if(card.rarity==='SSR')(function(c){d.onclick=function(){tenResults.classList.remove('active');showEnvelope(c)}})(card);d.style.opacity='0';d.style.animation='fi .4s ease forwards '+(i*.08)+'s';tenGrid.appendChild(d)});tenResults.classList.add('active')}
tenClose.onclick=function(){tenResults.classList.remove('active');updateBtnState()};
$('pullOne').onclick=function(){pullSingle()};
$('pullTen').onclick=function(){pullTen()};
confirmBtn.onclick=function(){overlay.className='pull-overlay';overlay.querySelectorAll('.petal').forEach(function(p){p.remove()});updateBtnState()};
updateBtnState();
</script>
</body>
</html>
