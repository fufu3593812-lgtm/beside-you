<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beside You</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'PingFang SC', sans-serif;
      background: #FFF9F5;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .header {
      padding: 20px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .greeting { font-size: 14px; color: #999; }
    .greeting .name {
      display: block;
      font-size: 28px;
      color: #333;
      font-weight: 300;
      margin-top: 4px;
      font-style: italic;
    }
    .header-icons { display: flex; gap: 12px; }
    .header-icons span {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(10px);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .info-cards {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
    }
    .card {
      flex: 1;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .card-label { font-size: 11px; color: #aaa; }
    .card-value { font-size: 18px; color: #555; margin-top: 4px; }
    .main-visual {
      position: relative;
      width: 100%;
      height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .main-visual .bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #FFF9F5 0%, #FFE8F0 100%);
      z-index: 0;
    }
    .main-visual .character {
      position: relative;
      z-index: 1;
      width: 240px;
      height: 380px;
      background: rgba(255,200,210,0.2);
      border-radius: 120px 120px 20px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ccc;
      font-size: 14px;
    }
    .bottom-cards {
      display: flex;
      gap: 12px;
      padding: 0 24px 16px;
    }
    .mood-card, .signin-card {
      flex: 1;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .mood-card .emoji { font-size: 24px; }
    .mood-card .text { font-size: 12px; color: #999; margin-top: 6px; }
    .signin-card .coins { font-size: 20px; color: #E8A87C; }
    .signin-card .text { font-size: 12px; color: #999; margin-top: 6px; }
    .tip-bar {
      margin: 0 24px 12px;
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 10px 16px;
      font-size: 12px;
      color: #aaa;
      text-align: center;
    }
    .dock {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(16px);
      padding: 12px 0 20px;
      display: flex;
      justify-content: space-around;
      box-shadow: 0 -2px 16px rgba(0,0,0,0.04);
    }
    .dock-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: #999;
    }
    .dock-item .icon {
      width: 28px; height: 28px;
      background: #F5E6E0;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .dock-item.active .icon { background: #FFD4D4; }
    .dock-item.active { color: #E88B8B; }
    .spacer { height: 80px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="greeting">
      下午好
      <span class="name">珩</span>
    </div>
    <div class="header-icons">
      <span>📅</span>
      <span>💌</span>
    </div>
  </div>
  <div class="info-cards">
    <div class="card">
      <div class="card-label">亲密度</div>
      <div class="card-value">♡ 72</div>
    </div>
    <div class="card">
      <div class="card-label">今日陪伴</div>
      <div class="card-value">1h 23m</div>
    </div>
  </div>
  <div class="main-visual">
    <div class="bg"></div>
    <div class="character">立绘区域</div>
  </div>
  <div class="bottom-cards">
    <div class="mood-card">
      <div class="emoji">☁️</div>
      <div class="text">今日心情：平静</div>
    </div>
    <div class="signin-card">
      <div class="coins">+5 🪙</div>
      <div class="text">今日已签到</div>
    </div>
  </div>
  <div class="tip-bar">💭 他好像在看着你发呆…</div>
  <div class="spacer"></div>
  <div class="dock">
    <div class="dock-item">
      <div class="icon">💬</div>
      <span>公屏</span>
    </div>
    <div class="dock-item">
      <div class="icon">👗</div>
      <span>衣柜</span>
    </div>
    <div class="dock-item active">
      <div class="icon">🏠</div>
      <span>主页</span>
    </div>
    <div class="dock-item">
      <div class="icon">🎴</div>
      <span>抽卡</span>
    </div>
    <div class="dock-item">
      <div class="icon">🛒</div>
      <span>商店</span>
    </div>
  </div>
</body>
</html>
