ds}.fade-in-delay-1{animation-delay:.1s}.fade-in-delay-2{animation-delay:.2s}.fade-in-delay-3{animation-delay:.3s}.fade-in-delay-4{animation-delay:.4s}@keyframes fadeIn{to{opacity:1}}.heart-float{position:absolute;pointer-events:none;z-index:100;animation:heartRise 1.2s ease-out forwards}.heart-float svg{width:28px;height:28px}@keyframes heartRise{0%{opacity:1;transform:translateY(0) scale(.5)}30%{opacity:1;transform:translateY(-20px) scale(1.1)}100%{opacity:0;transform:translateY(-80px) scale(.8)}}.toast{position:fixed;top:110px;left:50%;transform:translateX(-50%) translateY(-10px);padding:8px 16px;border-radius:20px;background:rgba(60,40,40,.85);backdrop-filter:blur(10px);font-size:12px;letter-spacing:1px;opacity:0;pointer-events:none;z-index:999;transition:opacity .4s,transform .4s;color:#FFD4A0}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

<script>
var API='https://beside-you-pi.vercel.app';
var OUTFIT_MAP={'月光睡裙':'/assets/%E7%9D%A1%E8%A3%99.PNG','慵懒卫衣':'/assets/%E5%8D%AB%E8%A1%A3.PNG','初恋JK':'/assets/jk.PNG','碎花裙':'/assets/%E7%A2%8E%E8%8A%B1%E8%A3%99.PNG','粉雾呢喃':'/assets/gacha/%E6%92%92%E5%A8%87%E7%AB%8B%E7%BB%98.png','血月静默':'/assets/gacha/%E7%94%9F%E6%B0%94%E7%AB%8B%E7%BB%98.png'};
var BG_MAP={'默认卧室':'/assets/%E5%8D%A7%E5%AE%A4.png','撒娇背景':'/assets/background/%E6%92%92%E5%A8%87%E8%83%8C%E6%99%AF.png','生气背景':'/assets/background/%E7%94%9F%E6%B0%94%E8%83%8C%E6%99%AF.PNG'};
var MOODS=[{id:'happy',label:'开心',icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>'},{id:'calm',label:'平静',icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="8" y1="14" x2="16" y2="14"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>'},{id:'tired',label:'疲惫',icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 15s1.5-1 4-1 4 1 4 1"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>'},{id:'miss',label:'想你',icon:'<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'},{id:'sad',label:'难过',icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>'},{id:'anxious',label:'焦虑',icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 15h8"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>'},{id:'excited',label:'兴奋',icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 13s1.5 3 4 3 4-3 4-3"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>'},{id:'sleepy',label:'困困',icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 1 4 1 4-1 4-1"/><path d="M9 9.5c0 .5-.5 1-1 1s-1-.5-1-1"/><path d="M17 9.5c0 .5-.5 1-1 1s-1-.5-1-1"/></svg>'}];

var AUTH=JSON.parse(localStorage.getItem('bsy_auth')||'null');
if(!AUTH||!AUTH.token||!AUTH.user){window.location.href='/index.html';}
var TOKEN=AUTH.token;
document.getElementById('displayName').textContent=AUTH.user.display_name||AUTH.user.username||'珩';

function showToast(msg,color){var t=document.getElementById('toast');t.textContent=msg;t.style.color=color||'#FFD4A0';t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2200)}

(function(){var h=new Date().getHours(),g=document.getElementById('greetText'),s=document.getElementById('subtitleText');if(h>=5&&h<12){g.textContent='Good morning,';s.innerHTML='新的一天开始了，<br>要好好吃早饭哦。'}else if(h>=12&&h<18){g.textContent='Good afternoon,';s.innerHTML='下午了，<br>记得喝杯水休息一下。'}else if(h>=18&&h<22){g.textContent='Good evening,';s.innerHTML='今天也辛苦了，<br>我一直都在这里等你。'}else{g.textContent='Late night,';s.innerHTML='夜深了，<br>该休息了，我陪着你。'}})();

(function(){var e=document.getElementById('companionTime'),s=Date.now();function p(n){return n<10?'0'+n:n}function u(){var d=Math.floor((Date.now()-s)/1000);e.textContent=p(Math.floor(d/3600))+':'+p(Math.floor(d%3600/60))+':'+p(d%60)}setInterval(u,1000)})();

function setIntimacy(v){v=Math.min(v||0,100);document.getElementById('intimacyValue').innerHTML=v+'<small>/100</small>';document.getElementById('intimacyFill').style.width=v+'%'}
setIntimacy(AUTH.user.intimacy||0);

function detectBrightness(img){try{var c=document.createElement('canvas');c.width=50;c.height=50;var x=c.getContext('2d');x.drawImage(img,0,0,50,50);var d=x.getImageData(0,0,50,50).data;var t=0;for(var j=0;j<d.length;j+=4)t+=d[j]*.299+d[j+1]*.587+d[j+2]*.114;document.body.classList.toggle('dark-bg',t/(d.length/4)<140)}catch(e){}}

(function(){
  var bi=document.getElementById('bgImg'),ci=document.getElementById('charImg');
  bi.onload=function(){bi.classList.add('loaded');detectBrightness(bi)};
  ci.onload=function(){ci.classList.add('loaded')};
  if(bi.complete&&bi.naturalHeight>0){bi.classList.add('loaded');detectBrightness(bi)}
  if(ci.complete&&ci.naturalHeight>0)ci.classList.add('loaded');
})();

// Wardrobe from backend
fetch(API+'/api/user/wardrobe',{headers:{'Authorization':'Bearer '+TOKEN}}).then(function(r){return r.json()}).then(function(d){
  if(!d.wardrobe)return;
  var o=d.wardrobe.outfit||'月光睡裙',b=d.wardrobe.bg||'默认卧室';
  var ci=document.getElementById('charImg'),bi=document.getElementById('bgImg');
  var os=OUTFIT_MAP[o]||OUTFIT_MAP['月光睡裙'];
  var bs=BG_MAP[b]||BG_MAP['默认卧室'];
  if(ci.src.indexOf(os)===-1)ci.src=os;
  if(bi.src.indexOf(bs)===-1)bi.src=bs;
}).catch(function(){});

// Sync user data
fetch(API+'/api/user/me',{headers:{'Authorization':'Bearer '+TOKEN}}).then(function(r){return r.json()}).then(function(d){if(d.user){setIntimacy(d.user.intimacy);AUTH.user.tokens=d.user.tokens;AUTH.user.intimacy=d.user.intimacy;localStorage.setItem('bsy_auth',JSON.stringify(AUTH))}}).catch(function(){});

// === CHECKIN — button element, guaranteed to work on iOS ===
document.getElementById('checkinBtn').onclick=function(){
  var dot=document.getElementById('checkinDot');
  showToast('签到中...','#B8A8A8');
  fetch(API+'/api/user/checkin',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN}}).then(function(r){
    if(r.ok)return r.json().then(function(d){dot.classList.remove('show');showToast('签到成功 +160 token','#FFD4A0');AUTH.user.tokens=d.tokens;localStorage.setItem('bsy_auth',JSON.stringify(AUTH))});
    if(r.status===409){dot.classList.remove('show');showToast('今天已签到过啦','#B8A8A8');return}
    showToast('签到失败','#F5A0A0');
  }).catch(function(){showToast('网络错误','#F5A0A0')});
};

// Touch character
document.getElementById('charImg').onclick=function(e){
  var cw=document.getElementById('charWrap'),r=cw.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;
  for(var i=0;i<5;i++){var h=document.createElement('div');h.className='heart-float';h.style.left=(x+(Math.random()-.5)*40)+'px';h.style.top=(y+(Math.random()-.5)*20)+'px';h.innerHTML='<svg viewBox="0 0 24 24" fill="#FFB6C1" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';h.style.animationDelay=(i*.1)+'s';cw.appendChild(h);setTimeout((function(el){return function(){el.remove()}})(h),1400)}
  var cur=AUTH.user.intimacy||0;
  fetch(API+'/api/user/sync-intimacy',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},body:JSON.stringify({intimacy:Math.min(cur+5,100)})}).then(function(r){if(r.ok){var nv=Math.min(cur+5,100);AUTH.user.intimacy=nv;localStorage.setItem('bsy_auth',JSON.stringify(AUTH));setIntimacy(nv);showToast('♥ 亲密度 +5','#FFB0C0')}}).catch(function(){});
};

// Mood
(function(){
  var mc=document.getElementById('moodCard'),mi=document.getElementById('moodIcon'),mt=document.getElementById('moodText'),mp=document.getElementById('moodPicker'),mo=document.getElementById('moodOverlay'),mg=document.getElementById('moodGrid');
  var cur='happy';
  function render(id){var m=MOODS.find(function(x){return x.id===id})||MOODS[0];mi.innerHTML=m.icon;mt.textContent=m.label;cur=id}
  render(cur);
  MOODS.forEach(function(m){var it=document.createElement('div');it.className='mp-item';it.innerHTML=m.icon+'<span class="mp-label">'+m.label+'</span>';it.setAttribute('data-mood',m.id);it.onclick=function(){render(m.id);setTimeout(function(){mp.classList.remove('show');mo.classList.remove('show')},200);fetch(API+'/api/user/mood',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},body:JSON.stringify({mood:m.id})}).catch(function(){})};mg.appendChild(it)});
  mc.onclick=function(){mp.classList.add('show');mo.classList.add('show');mg.querySelectorAll('.mp-item').forEach(function(el){el.classList.toggle('selected',el.getAttribute('data-mood')===cur)})};
  mo.onclick=function(){mp.classList.remove('show');mo.classList.remove('show')};
  fetch(API+'/api/user/mood',{headers:{'Authorization':'Bearer '+TOKEN}}).then(function(r){return r.json()}).then(function(d){if(d.mood)render(d.mood)}).catch(function(){});
})();
</script>
