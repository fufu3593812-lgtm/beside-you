<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Beside You</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'PingFang SC', sans-serif;
      background: #FFF8F7;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
      max-width: 430px;
      margin: 0 auto;
    }

    .bg-room {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .character {
      position: absolute;
      bottom: 96px;
      left: 50%;
      transform: translateX(-50%) translateY(0) scale(1);
      height: 70vh;
      object-fit: contain;
      z-index: 1;
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { transform: translateX(-50%) translateY(0) scale(1); }
      50% { transform: translateX(-50%) translateY(-16px) scale(1.008); }
    }

    .glass {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
    }

    .top-left {
      position: absolute;
      top: 56px;
      left: 24px;
      z-index: 10;
    }

    .top-left .greet {
      font-size: 13px;
      color: #C4A08A;
      font-style: italic;
      letter-spacing: 0.5px;
    }

    .top-left .name {
      font-size: 40px;
      font-weight: 300;
      font-style: italic;
      color: #3D3333;
      margin-top: 4px;
      font-family: 'Georgia', serif;
    }

    .top-left .subtitle {
      font-size: 12px;
      color: #B0A0A0;
      margin-top: 8px;
      line-height: 1.7;
      max-width: 180px;
    }

    .top-right {
      position: absolute;
      top: 56px;
      right: 20px;
      z-index: 10;
      display: flex;
      gap: 12px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .icon-btn:active { transform: scale(0.95); }

    .icon-btn svg {
      width: 20px;
      height: 20px;
      stroke: #8D7676;
      stroke-width: 1.8;
      fill: none;
    }

    .dot {
      position: absolute;
      top: 7px;
      right: 7px;
      width: 6px;
      height: 6px;
      background: #F28B82;
      border-radius: 50%;
    }

    .right-cards {
      position: absolute;
      top: 148px;
      right: 16px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .r-card {
      border-radius: 16px;
      padding: 14px 16px;
      min-width: 120px;
    }

    .r-card .label {
      font-size: 10px;
      color: #B8A0A0;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .r-card .label svg {
      width: 12px;
      height: 12px;
      stroke: #E8A0A0;
      stroke-width: 2;
      fill: none;
    }

    .r-card .value {
      font-size: 24px;
      font-weight: 300;
      color: #7D6666;
      margin-top: 6px;
    }

    .r-card .value small {
      font-size: 12px;
      color: #B8A8A8;
    }

    .progress-bar {
      margin-top: 8px;
      height: 3px;
      background: #F0E0E0;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar .fill {
      height: 100%;
      width: 72%;
      background: linear-gradient(90deg, #F5C4C4, #E8A0A0);
      border-radius: 2px;
    }

    .mood-card {
      position: absolute;
      bottom: 120px;
      left: 16px;
      z-index: 10;
      border-radius: 16px;
      padding: 14px 18px;
      text-align: center;
    }

    .mood-card .title { font-size: 10px; color: #B8A0A0; text-align: center; }
    .mood-card .mood-icon { margin-top: 8px; display: flex; justify-content: center; }

    .mood-card .mood-icon svg {
      width: 28px;
      height: 28px;
      stroke: #E8A0A0;
      stroke-width: 1.6;
      fill: none;
    }

    .mood-card .mood-text {
      font-size: 11px;
      color: #9A8888;
      margin-top: 6px;
      text-align: center;
    }

    .story-btn {
      position: absolute;
      bottom: 120px;
      right: 20px;
      z-index: 10;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s ease;
      text-decoration: none;
    }

    .story-btn:active { transform: scale(0.95); }

    .story-btn svg {
      width: 22px;
      height: 22px;
      stroke: #8D7676;
      stroke-width: 1.8;
      fill: none;
    }

    .story-btn .text {
      font-size: 8px;
      color: #B8A0A0;
      margin-top: 3px;
    }

    .dock {
      position: absolute;
      bottom: 12px;
      left: 16px;
      right: 16px;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .dock-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      border-radius: 20px;
      padding: 12px 4px 10px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.3s ease;
      text-decoration: none;
    }

    .dock-item:active { transform: scale(0.95); }

    .dock-item.active {
      background: rgba(240, 210, 210, 0.65);
      border-color: rgba(240, 200, 200, 0.5);
    }

    .dock-item svg {
      width: 22px;
      height: 22px;
      stroke: #7D6666;
      stroke-width: 1.6;
      fill: none;
    }

    .dock-item.active svg { stroke: #C07070; }
    .dock-item .d-en { font-size: 8px; color: #8D7676; margin-top: 2px; }
    .dock-item .d-cn { font-size: 8px; color: #B8A8A8; }

    .fade-in { opacity: 0; animation: fadeIn 0.6s ease forwards; }
    .fade-in-delay-1 { animation-delay: 0.1s; }
    .fade-in-delay-2 { animation-delay: 0.2s; }
    .fade-in-delay-3 { animation-delay: 0.3s; }
    .fade-in-delay-4 { animation-delay: 0.4s; }

    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>
<body>
  <img class="bg-room" src="../assets/%E5%8D%A7%E5%AE%A4.png" alt="卧室">
  <img class="character fade-in" src="../assets/%E7%9D%A1%E8%A3%99.png" alt="珩">

  <div class="top-left fade-in fade-in-delay-1">
    <div class="greet" id="greet-text">Good evening,</div>
    <div class="name">珩</div>
    <div class="subtitle" id="subtitle-text">今天也辛苦了，<br>我一直都在这里等你。</div>
  </div>

  <div class="top-right fade-in fade-in-delay-2">
    <div class="icon-btn glass">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </div>
    <div class="icon-btn glass">
      <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,6 12,13 2,6"/></svg>
      <span class="dot"></span>
    </div>
  </div>

  <div class="right-cards fade-in fade-in-delay-2">
    <div class="r-card glass">
      <div class="label">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        亲密度
      </div>
      <div class="value">72<small>/100</small></div>
      <div class="progress-bar"><div class="fill"></div></div>
    </div>
    <div class="r-card glass">
      <div class="label">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
        今日陪伴
      </div>
      <div class="value" style="font-size:18px;" id="companion-time">00:00:00</div>
    </div>
  </div>

  <div class="mood-card glass fade-in fade-in-delay-3">
    <div class="title">今日心情</div>
    <div class="mood-icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
    </div>
    <div class="mood-text">开心</div>
  </div>

  <a class="story-btn glass fade-in fade-in-delay-3" href="story.html">
    <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="13" y2="11"/></svg>
    <span class="text">主线</span>
  </a>

  <div class="dock fade-in fade-in-delay-4">
    <a class="dock-item glass" href="chat.html">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="d-en">Chat</span>
      <span class="d-cn">聊天</span>
    </a>
    <a class="dock-item glass" href="wardrobe.html">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2z"/><line x1="12" y1="22" x2="12" y2="12"/><polyline points="22,7 12,12 2,7"/></svg>
      <span class="d-en">Style</span>
      <span class="d-cn">装扮</span>
    </a>
    <div class="dock-item glass active">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      <span class="d-en">Home</span>
      <span class="d-cn">主页</span>
    </div>
    <a class="dock-item glass" href="gacha.html">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span class="d-en">Heartbeat</span>
      <span class="d-cn">心动</span>
    </a>
    <a class="dock-item glass" href="collection.html">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span class="d-en">Collection</span>
      <span class="d-cn">收藏</span>
    </a>
  </div>

  <script>
    (function() {
      const hour = new Date().getHours();
      const greetEl = document.getElementById('greet-text');
      const subEl = document.getElementById('subtitle-text');
      if (hour >= 5 && hour < 12) {
        greetEl.textContent = 'Good morning,';
        subEl.innerHTML = '新的一天开始了，<br>要好好吃早饭哦。';
      } else if (hour >= 12 && hour < 18) {
        greetEl.textContent = 'Good afternoon,';
        subEl.innerHTML = '下午了，<br>记得喝杯水休息一下。';
      } else if (hour >= 18 && hour < 22) {
        greetEl.textContent = 'Good evening,';
        subEl.innerHTML = '今天也辛苦了，<br>我一直都在这里等你。';
      } else {
        greetEl.textContent = 'Late night,';
        subEl.innerHTML = '夜深了，<br>该休息了，我陪着你。';
      }
    })();

    (function() {
      const el = document.getElementById('companion-time');
      const start = Date.now();
      function pad(n) { return n < 10 ? '0' + n : n; }
      function update() {
        const diff = Math.floor((Date.now() - start) / 1000);
        el.textContent = pad(Math.floor(diff/3600)) + ':' + pad(Math.floor((diff%3600)/60)) + ':' + pad(diff%60);
      }
      setInterval(update, 1000);
      update();
    })();
  </script>
</body>
</html>
