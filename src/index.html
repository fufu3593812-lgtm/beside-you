<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Beside You</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, 'PingFang SC', sans-serif; background: #FFF8F7; width: 100vw; height: 100vh; overflow: hidden; position: relative; max-width: 430px; margin: 0 auto; }
    .bg-room { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; background: linear-gradient(180deg, #FFF5F0 0%, #FFE8E0 30%, #FFDDD4 60%, #F5D0C8 100%); }
    .bg-room img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.8s ease; }
    .bg-room img.loaded { opacity: 1; }
    .overlay-top, .overlay-bottom { position: absolute; left: 0; right: 0; z-index: 0; pointer-events: none; opacity: 0; transition: opacity 0.4s; }
    .overlay-top { top: 0; height: 200px; background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.1) 60%, transparent 100%); }
    .overlay-bottom { bottom: 0; height: 180px; background: linear-gradient(0deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.1) 50%, transparent 100%); }
    body.dark-bg .overlay-top, body.dark-bg .overlay-bottom { opacity: 1; }
    .char-wrap { position: absolute; bottom: 80px; left: 0; right: 0; height: 70vh; z-index: 1; display: flex; justify-content: center; align-items: flex-end; animation: breathe 3s ease-in-out infinite; cursor: pointer; pointer-events: none; }
    .char-wrap.hidden { display: none; }
    .character { height: 100%; max-width: 85vw; object-fit: contain; opacity: 0; transition: opacity 0.6s ease; pointer-events: auto; }
    .character.loaded { opacity: 1; }
    @keyframes breathe { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-6px) scale(1.003); } }
    .top-left { position: absolute; top: 56px; left: 24px; z-index: 10; }
    .top-left .greet { font-size: 13px; color: #C4A08A; font-style: italic; letter-spacing: 0.5px; transition: color 0.4s, text-shadow 0.4s; }
    .top-left .name { font-size: 40px; font-weight: 300; font-style: italic; color: #B8807A; margin-top: 4px; font-family: 'Georgia', serif; transition: color 0.4s, text-shadow 0.4s; }
    .top-left .subtitle { font-size: 12px; color: #B0A0A0; margin-top: 8px; line-height: 1.7; max-width: 180px; transition: color 0.4s, text-shadow 0.4s; }
    .top-right { position: absolute; top: 56px; right: 20px; z-index: 10; display: flex; gap: 12px; }
    .icon-btn { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; transition: transform 0.2s ease, background 0.4s, border-color 0.4s; text-decoration: none; background: rgba(255,255,255,0.55); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); box-shadow: 0 4px 16px rgba(0,0,0,0.04); }
    .icon-btn:active { transform: scale(0.95); }
    .icon-btn svg { width: 20px; height: 20px; stroke: #8D7676; stroke-width: 1.8; fill: none; transition: stroke 0.4s; }
    .dot { position: absolute; top: 7px; right: 7px; width: 6px; height: 6px; background: #F28B82; border-radius: 50%; }
    .dot.hidden { display: none; }
    .right-cards { position: absolute; top: 148px; right: 16px; z-index: 10; display: flex; flex-direction: column; gap: 12px; }
    .r-card { border-radius: 16px; padding: 14px 16px; min-width: 120px; background: rgba(255,255,255,0.55); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); box-shadow: 0 4px 16px rgba(0,0,0,0.04); transition: background 0.4s, border-color 0.4s; }
    .r-card .label { font-size: 10px; color: #B8A0A0; display: flex; align-items: center; gap: 4px; transition: color 0.4s; }
    .r-card .label svg { width: 12px; height: 12px; stroke: #E8A0A0; stroke-width: 2; fill: none; }
    .r-card .value { font-size: 24px; font-weight: 300; color: #7D6666; margin-top: 6px; transition: color 0.4s; }
    .r-card .value small { font-size: 12px; color: #B8A8A8; transition: color 0.4s; }
    .progress-bar { margin-top: 8px; height: 3px; background: #F0E0E0; border-radius: 2px; overflow: hidden; transition: background 0.4s; }
    .progress-bar .fill { height: 100%; background: linear-gradient(90deg, #F5C4C4, #E8A0A0); border-radius: 2px; transition: width 0.5s ease; }
    .mood-card { position: absolute; bottom: 130px; left: 16px; z-index: 10; border-radius: 16px; padding: 14px 18px; text-align: center; background: rgba(255,255,255,0.55); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); box-shadow: 0 4px 16px rgba(0,0,0,0.04); transition: background 0.4s, border-color 0.4s; }
    .mood-card .title { font-size: 10px; color: #B8A0A0; text-align: center; transition: color 0.4s; }
    .mood-card .mood-icon { margin-top: 8px; display: flex; justify-content: center; }
    .mood-card .mood-icon svg { width: 28px; height: 28px; stroke: #E8A0A0; stroke-width: 1.6; fill: none; }
    .mood-card .mood-text { font-size: 11px; color: #9A8888; margin-top: 6px; text-align: center; transition: color 0.4s; }
    .story-btn { position: absolute; bottom: 130px; right: 20px; z-index: 10; width: 52px; height: 52px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s ease, background 0.4s, border-color 0.4s; text-decoration: none; background: rgba(255,255,255,0.55); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); box-shadow: 0 4px 16px rgba(0,0,0,0.04); }
    .story-btn:active { transform: scale(0.95); }
    .story-btn svg { width: 22px; height: 22px; stroke: #8D7676; stroke-width: 1.8; fill: none; transition: stroke 0.4s; }
    .story-btn .text { font-size: 8px; color: #B8A0A0; margin-top: 3px; transition: color 0.4s; }
    .dock { position: absolute; bottom: 16px; left: 16px; right: 16px; z-index: 20; display: flex; justify-content: space-between; gap: 8px; }
    .dock-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; border-radius: 20px; padding: 12px 4px 10px; cursor: pointer; transition: transform 0.2s ease, background 0.4s, border-color 0.4s; text-decoration: none; background: rgba(255,255,255,0.55); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6); box-shadow: 0 4px 16px rgba(0,0,0,0.04); }
    .dock-item:active { transform: scale(0.95); }
    .dock-item.active { background: rgba(240, 210, 210, 0.65); border-color: rgba(240, 200, 200, 0.5); }
    .dock-item svg { width: 22px; height: 22px; stroke: #7D6666; stroke-width: 1.6; fill: none; transition: stroke 0.4s; }
    .dock-item.active svg { stroke: #C07070; }
    .dock-item .d-en { font-size: 8px; color: #8D7676; margin-top: 2px; transition: color 0.4s; }
    .dock-item .d-cn { font-size: 8px; color: #B8A8A8; transition: color 0.4s; }
    body.dark-bg .top-left .greet { color: rgba(255,255,255,0.85); text-shadow: 0 1px 4px rgba(0,0,0,0.4); }
    body.dark-bg .top-left .name { color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.4); }
    body.dark-bg .top-left .subtitle { color: rgba(255,255,255,0.8); text-shadow: 0 1px 3px rgba(0,0,0,0.4); }
    body.dark-bg .icon-btn { background: rgba(0,0,0,0.25); border-color: rgba(255,255,255,0.15); }
    body.dark-bg .icon-btn svg { stroke: rgba(255,255,255,0.9); }
    body.dark-bg .r-card { background: rgba(0,0,0,0.25); border-color: rgba(255,255,255,0.15); }
    body.dark-bg .r-card .label { color: rgba(255,255,255,0.7); }
    body.dark-bg .r-card .value { color: #fff; }
    body.dark-bg .r-card .value small { color: rgba(255,255,255,0.6); }
    body.dark-bg .progress-bar { background: rgba(255,255,255,0.15); }
    body.dark-bg .mood-card { background: rgba(0,0,0,0.25); border-color: rgba(255,255,255,0.15); }
    body.dark-bg .mood-card .title { color: rgba(255,255,255,0.7); }
    body.dark-bg .mood-card .mood-text { color: rgba(255,255,255,0.8); }
    body.dark-bg .story-btn { background: rgba(0,0,0,0.25); border-color: rgba(255,255,255,0.15); }
    body.dark-bg .story-btn svg { stroke: rgba(255,255,255,0.9); }
    body.dark-bg .story-btn .text { color: rgba(255,255,255,0.7); }
    body.dark-bg .dock-item { background: rgba(0,0,0,0.25); border-color: rgba(255,255,255,0.12); }
    body.dark-bg .dock-item.active { background: rgba(240,180,180,0.3); border-color: rgba(240,200,200,0.3); }
    body.dark-bg .dock-item svg { stroke: rgba(255,255,255,0.85); }
    body.dark-bg .dock-item.active svg { stroke: #FFD4D4; }
    body.dark-bg .dock-item .d-en { color: rgba(255,255,255,0.7); }
    body.dark-bg .dock-item .d-cn { color: rgba(255,255,255,0.5); }
    .fade-in { opacity: 0; animation: fadeIn 0.6s ease forwards; }
    .fade-in-delay-1 { animation-delay: 0.1s; }
    .fade-in-delay-2 { animation-delay: 0.2s; }
    .fade-in-delay-3 { animation-delay: 0.3s; }
    .fade-in-delay-4 { animation-delay: 0.4s; }
    @keyframes fadeIn { to { opacity: 1; } }
    .heart-float { position: absolute; pointer-events: none; z-index: 100; animation: heartRise 1.2s ease-out forwards; }
    .heart-float svg { width: 28px; height: 28px; }
    @keyframes heartRise { 0% { opacity: 1; transform: translateY(0) scale(0.5); } 30% { opacity: 1; transform: translateY(-20px) scale(1.1); } 100% { opacity: 0; transform: translateY(-80px) scale(0.8); } }
    .checkin-toast { position: fixed; top: 110px; left: 50%; transform: translateX(-50%) translateY(-10px); padding: 8px 16px; border-radius: 20px; background: rgba(60, 40, 40, 0.85); backdrop-filter: blur(10px); color: #FFD4A0; font-size: 12px; letter-spacing: 1px; opacity: 0; pointer-events: none; z-index: 999; transition: opacity .4s, transform .4s; }
    .checkin-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .tap-toast { position: fixed; top: 110px; left: 50%; transform: translateX(-50%) translateY(-10px); padding: 8px 16px; border-radius: 20px; background: rgba(60, 40, 40, 0.85); backdrop-filter: blur(10px); color: #FFB0C0; font-size: 12px; letter-spacing: 1px; opacity: 0; pointer-events: none; z-index: 999; transition: opacity .4s, transform .4s; }
    .tap-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="bg-room" id="bgRoom"></div>
  <div class="overlay-top"></div>
  <div class="overlay-bottom"></div>
  <div class="char-wrap" id="charWrap">
    <img class="character" id="charImg" alt="角色">
  </div>
  <div class="top-left fade-in fade-in-delay-1">
    <div class="greet" id="greet-text">Good evening,</div>
    <div class="name" id="display-name">珩</div>
    <div class="subtitle" id="subtitle-text">今天也辛苦了，<br>我一直都在这里等你。</div>
  </div>
  <div class="top-right fade-in fade-in-delay-2">
    <div class="icon-btn" id="checkinBtn">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span class="dot" id="checkinDot"></span>
    </div>
    <a class="icon-btn" href="/src/letter.html">
      <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="22,6 12,13 2,6"/></svg>
      <span class="dot" id="letterDot"></span>
    </a>
  </div>
  <div class="checkin-toast" id="checkinToast">签到成功 +160 token</div>
  <div class="tap-toast" id="tapToast">♥ 亲密度 +5</div>
  <div class="right-cards fade-in fade-in-delay-2">
    <div class="r-card">
      <div class="label"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>亲密度</div>
      <div class="value" id="intimacy-value">0<small>/100</small></div>
      <div class="progress-bar"><div class="fill" id="intimacy-fill"></div></div>
    </div>
    <div class="r-card">
      <div class="label"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>今日陪伴</div>
      <div class="value" style="font-size:18px;" id="companion-time">00:00:00</div>
    </div>
  </div>
  <div class="mood-card fade-in fade-in-delay-3">
    <div class="title">今日心情</div>
    <div class="mood-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></div>
    <div class="mood-text">开心</div>
  </div>
  <a class="story-btn fade-in fade-in-delay-3" href="/src/story.html">
    <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="13" y2="11"/></svg>
    <span class="text">主线</span>
  </a>
  <div class="dock fade-in fade-in-delay-4">
    <a class="dock-item" href="/src/chat.html"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="d-en">Chat</span><span class="d-cn">聊天</span></a>
    <a class="dock-item" href="/src/wardrobe.html"><svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2z"/><line x1="12" y1="22" x2="12" y2="12"/><polyline points="22,7 12,12 2,7"/></svg><span class="d-en">Style</span><span class="d-cn">装扮</span></a>
    <div class="dock-item active"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg><span class="d-en">Home</span><span class="d-cn">主页</span></div>
    <a class="dock-item" href="/src/gacha.html"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span class="d-en">Heartbeat</span><span class="d-cn">心动</span></a>
    <a class="dock-item" href="/src/collection.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span class="d-en">Collection</span><span class="d-cn">收藏</span></a>
  </div>
  <script>
    function detectBrightness(imgEl) {
      try {
        var canvas = document.createElement('canvas');
        var size = 50;
        canvas.width = size; canvas.height = size;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(imgEl, 0, 0, size, size);
        var data = ctx.getImageData(0, 0, size, size).data;
        var total = 0;
        var count = data.length / 4;
        for (var i = 0; i < data.length; i += 4) {
          total += (data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114);
        }
        var avg = total / count;
        if (avg < 140) {
          document.body.classList.add('dark-bg');
          document.body.classList.remove('light-bg');
        } else {
          document.body.classList.remove('dark-bg');
          document.body.classList.add('light-bg');
        }
      } catch(e) {
        document.body.classList.add('light-bg');
      }
    }

    (function() {
      var auth = localStorage.getItem('bsy_auth');
      if (!auth) { window.location.href = '/index.html'; return; }
      try {
        var data = JSON.parse(auth);
        if (!data.token || !data.user) { window.location.href = '/index.html'; return; }
        document.getElementById('display-name').textContent = data.user.display_name || data.user.username || '珩';
      } catch(e) { window.location.href = '/index.html'; }
    })();

    (function() {
      var charImg = document.getElementById('charImg');
      var charWrap = document.getElementById('charWrap');
      var bgMode = localStorage.getItem('bsy_bg_mode') || 'normal';

      // If card mode, hide character
      if (bgMode === 'card') {
        charWrap.classList.add('hidden');
      } else {
        var outfitImg = localStorage.getItem('bsy_outfit_img');
        var charSrc = (outfitImg && outfitImg.length > 0) ? outfitImg : '../assets/睡裙.PNG';
        charImg.onload = function() { charImg.classList.add('loaded'); };
        charImg.src = charSrc;
      }

      var bgRoom = document.getElementById('bgRoom');
      var bgImgSrc = localStorage.getItem('bsy_bg');
      var bgSrc = (bgImgSrc && bgImgSrc.length > 0) ? bgImgSrc : '../assets/卧室.png';
      var img = new Image();
      img.onload = function() {
        img.classList.add('loaded');
        bgRoom.appendChild(img);
        detectBrightness(img);
      };
      img.onerror = function() {
        var img2 = new Image();
        img2.onload = function() { img2.classList.add('loaded'); bgRoom.appendChild(img2); document.body.classList.add('light-bg'); };
        img2.src = bgSrc;
      };
      img.src = bgSrc;
    })();

    (function() {
      var hour = new Date().getHours();
      var greetEl = document.getElementById('greet-text');
      var subEl = document.getElementById('subtitle-text');
      if (hour >= 5 && hour < 12) { greetEl.textContent = 'Good morning,'; subEl.innerHTML = '新的一天开始了，<br>要好好吃早饭哦。'; }
      else if (hour >= 12 && hour < 18) { greetEl.textContent = 'Good afternoon,'; subEl.innerHTML = '下午了，<br>记得喝杯水休息一下。'; }
      else if (hour >= 18 && hour < 22) { greetEl.textContent = 'Good evening,'; subEl.innerHTML = '今天也辛苦了，<br>我一直都在这里等你。'; }
      else { greetEl.textContent = 'Late night,'; subEl.innerHTML = '夜深了，<br>该休息了，我陪着你。'; }
    })();

    (function() {
      var el = document.getElementById('companion-time');
      var start = Date.now();
      function pad(n) { return n < 10 ? '0' + n : n; }
      function update() { var diff = Math.floor((Date.now() - start) / 1000); el.textContent = pad(Math.floor(diff/3600)) + ':' + pad(Math.floor((diff%3600)/60)) + ':' + pad(diff%60); }
      setInterval(update, 1000); update();
    })();

    (function() {
      var btn = document.getElementById('checkinBtn');
      var dot = document.getElementById('checkinDot');
      var toast = document.getElementById('checkinToast');
      var today = new Date().toISOString().slice(0, 10);
      var key = 'bsy_checkin_' + today;
      if (localStorage.getItem(key)) { dot.classList.add('hidden'); }
      btn.addEventListener('click', async function() {
        if (localStorage.getItem(key)) return;
        var auth = JSON.parse(localStorage.getItem('bsy_auth') || '{}');
        var token = auth.token;
        try {
          var res = await fetch('/api/user/checkin', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token } });
          if (res.ok) {
            var data = await res.json();
            localStorage.setItem(key, '1');
            var newTokens = data.tokens || (parseInt(localStorage.getItem('bsy_tokens') || '0') + 160);
            localStorage.setItem('bsy_tokens', newTokens.toString());
            if (auth.user) { auth.user.tokens = newTokens; localStorage.setItem('bsy_auth', JSON.stringify(auth)); }
          } else {
            localStorage.setItem(key, '1');
            var t = parseInt(localStorage.getItem('bsy_tokens') || '0') + 160;
            localStorage.setItem('bsy_tokens', t.toString());
          }
        } catch(e) {
          localStorage.setItem(key, '1');
          var t = parseInt(localStorage.getItem('bsy_tokens') || '0') + 160;
          localStorage.setItem('bsy_tokens', t.toString());
        }
        dot.classList.add('hidden');
        toast.classList.add('show');
        setTimeout(function() { toast.classList.remove('show'); }, 2000);
        updateIntimacy();
      });
    })();

    (function() {
      var charWrap = document.getElementById('charWrap');
      var tapToast = document.getElementById('tapToast');
      var today = new Date().toISOString().slice(0, 10);
      var tapKey = 'bsy_tap_' + today;
      charWrap.addEventListener('click', function(e) {
        spawnHearts(e);
        if (localStorage.getItem(tapKey)) return;
        localStorage.setItem(tapKey, '1');
        var intimacy = parseInt(localStorage.getItem('bsy_intimacy') || '0');
        intimacy = Math.min(intimacy + 5, 100);
        localStorage.setItem('bsy_intimacy', intimacy.toString());
        updateIntimacy();
        tapToast.classList.add('show');
        setTimeout(function() { tapToast.classList.remove('show'); }, 2000);
      });
      function spawnHearts(e) {
        var rect = charWrap.getBoundingClientRect();
        var x = e.clientX - rect.left;
        var y = e.clientY - rect.top;
        for (var i = 0; i < 5; i++) {
          var heart = document.createElement('div');
          heart.className = 'heart-float';
          heart.style.left = (x + (Math.random() - 0.5) * 40) + 'px';
          heart.style.top = (y + (Math.random() - 0.5) * 20) + 'px';
          heart.innerHTML = '<svg viewBox="0 0 24 24" fill="#FFB6C1" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
          heart.style.animationDelay = (i * 0.1) + 's';
          charWrap.appendChild(heart);
          (function(h) { setTimeout(function() { h.remove(); }, 1400); })(heart);
        }
      }
    })();

    (function() {
      var letterDot = document.getElementById('letterDot');
      var readList = JSON.parse(localStorage.getItem('bsy_mail_read') || '[]');
      var allMailIds = ['ann-welcome'];
      var hasUnread = allMailIds.some(function(id) { return readList.indexOf(id) === -1; });
      if (!hasUnread) letterDot.classList.add('hidden');
    })();

    (function() { updateIntimacy(); })();
    function updateIntimacy() {
      var intimacy = parseInt(localStorage.getItem('bsy_intimacy') || '0');
      if (intimacy > 100) intimacy = 100;
      document.getElementById('intimacy-value').innerHTML = intimacy + '<small>/100</small>';
      document.getElementById('intimacy-fill').style.width = intimacy + '%';
    }
  </script>
</body>
