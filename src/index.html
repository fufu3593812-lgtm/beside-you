var DEFAULT_BG='/assets/%E5%8D%A7%E5%AE%A4.png';
var DEFAULT_OUTFIT='/assets/%E7%9D%A1%E8%A3%99.PNG';
var MOODS=[{id:'happy',label:'开心',icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>'},{id:'calm',label:'平静',icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="8" y1="14" x2="16" y2="14"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>'},{id:'tired',label:'疲惫',icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 15s1.5-1 4-1 4 1 4 1"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>'},{id:'miss',label:'想你',icon:'<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'},{id:'sad',label:'难过',icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>'},{id:'anxious',label:'焦虑',icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 15h8"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/><path d="M8 8l2-1"/><path d="M14 8l2-1"/></svg>'},{id:'excited',label:'兴奋',icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 13s1.5 3 4 3 4-3 4-3"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>'},{id:'sleepy',label:'困困',icon:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 1 4 1 4-1 4-1"/><path d="M9 9.5c0 .5-.5 1-1 1s-1-.5-1-1"/><path d="M17 9.5c0 .5-.5 1-1 1s-1-.5-1-1"/></svg>'}];
function detectBrightness(i){try{var c=document.createElement('canvas');c.width=50;c.height=50;var x=c.getContext('2d');x.drawImage(i,0,0,50,50);var d=x.getImageData(0,0,50,50).data;var t=0;for(var j=0;j<d.length;j+=4)t+=d[j]*.299+d[j+1]*.587+d[j+2]*.114;if(t/(d.length/4)<140){document.body.classList.add('dark-bg');document.body.classList.remove('light-bg')}else{document.body.classList.remove('dark-bg');document.body.classList.add('light-bg')}}catch(e){document.body.classList.add('light-bg')}}
(function(){var a=localStorage.getItem('bsy_auth');if(!a){window.location.href='/index.html';return}try{var d=JSON.parse(a);if(!d.token||!d.user){window.location.href='/index.html';return}document.getElementById('display-name').textContent=d.user.display_name||d.user.username||'珩'}catch(e){window.location.href='/index.html'}})();
(async function(){
  var ci=document.getElementById('charImg');
  var bi=document.getElementById('bgImg');
  // Default images are already in HTML src, so they start loading immediately
  // Just add loaded class when done
  bi.onload=function(){bi.classList.add('loaded');detectBrightness(bi)};
  ci.onload=function(){ci.classList.add('loaded')};
  // If images are already cached, trigger onload
  if(bi.complete&&bi.naturalHeight>0){bi.classList.add('loaded');detectBrightness(bi)}
  if(ci.complete&&ci.naturalHeight>0){ci.classList.add('loaded')}
  // Fetch wardrobe from API and update if different from default
  var a=JSON.parse(localStorage.getItem('bsy_auth')||'{}');
  if(a.token){try{
    var r=await fetch(API+'/api/user/wardrobe',{headers:{'Authorization':'Bearer '+a.token}});
    if(r.ok){var d=await r.json();if(d.wardrobe){
      var outfit=d.wardrobe.outfit||'月光睡裙';
      localStorage.setItem('bsy_outfit',outfit);
      if(outfit!=='月光睡裙'&&OUTFIT_MAP[outfit]){ci.src=OUTFIT_MAP[outfit]}
      // bg_img could be a name or a URL from old code
      var bg=d.wardrobe.bg_img;
      if(bg&&bg!=='/assets/%E5%8D%A7%E5%AE%A4.png'&&bg!==DEFAULT_BG){
        bi.src=bg.indexOf('/')===0||bg.indexOf('http')===0?bg:DEFAULT_BG;
      }
    }}
  }catch(e){}}
})();
(function(){var h=new Date().getHours(),g=document.getElementById('greet-text'),s=document.getElementById('subtitle-text');if(h>=5&&h<12){g.textContent='Good morning,';s.innerHTML='新的一天开始了，<br>要好好吃早饭哦。'}else if(h>=12&&h<18){g.textContent='Good afternoon,';s.innerHTML='下午了，<br>记得喝杯水休息一下。'}else if(h>=18&&h<22){g.textContent='Good evening,';s.innerHTML='今天也辛苦了，<br>我一直都在这里等你。'}else{g.textContent='Late night,';s.innerHTML='夜深了，<br>该休息了，我陪着你。'}})();
(function(){var e=document.getElementById('companion-time'),s=Date.now();function p(n){return n<10?'0'+n:n}function u(){var d=Math.floor((Date.now()-s)/1000);e.textContent=p(Math.floor(d/3600))+':'+p(Math.floor((d%3600)/60))+':'+p(d%60)}setInterval(u,1000);u()})();
(function(){var b=document.getElementById('checkinBtn'),d=document.getElementById('checkinDot'),t=document.getElementById('checkinToast'),td=new Date().toISOString().slice(0,10),k='bsy_checkin_'+td;if(localStorage.getItem(k))d.classList.add('hidden');b.addEventListener('click',async function(){if(localStorage.getItem(k))return;var a=JSON.parse(localStorage.getItem('bsy_auth')||'{}');try{var r=await fetch(API+'/api/user/checkin',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+a.token}});if(r.ok){var data=await r.json();localStorage.setItem(k,'1');var nt=data.tokens||(parseInt(localStorage.getItem('bsy_tokens')||'0')+160);localStorage.setItem('bsy_tokens',nt.toString());if(a.user){a.user.tokens=nt;localStorage.setItem('bsy_auth',JSON.stringify(a))}}else{localStorage.setItem(k,'1')}}catch(e){localStorage.setItem(k,'1')}d.classList.add('hidden');t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000);updateIntimacy()})})();
(function(){var cw=document.getElementById('charWrap'),tt=document.getElementById('tapToast'),td=new Date().toISOString().slice(0,10),tk='bsy_tap_'+td;cw.addEventListener('click',function(e){sh(e);if(localStorage.getItem(tk))return;localStorage.setItem(tk,'1');var i=Math.min(parseInt(localStorage.getItem('bsy_intimacy')||'0')+5,100);localStorage.setItem('bsy_intimacy',i.toString());updateIntimacy();syncIntimacyToDB(i);tt.classList.add('show');setTimeout(function(){tt.classList.remove('show')},2000)});function sh(e){var r=cw.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;for(var i=0;i<5;i++){var h=document.createElement('div');h.className='heart-float';h.style.left=(x+(Math.random()-.5)*40)+'px';h.style.top=(y+(Math.random()-.5)*20)+'px';h.innerHTML='<svg viewBox="0 0 24 24" fill="#FFB6C1" stroke="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';h.style.animationDelay=(i*.1)+'s';cw.appendChild(h);(function(el){setTimeout(function(){el.remove()},1400)})(h)}}})();
function syncIntimacyToDB(v){try{var a=JSON.parse(localStorage.getItem('bsy_auth')||'{}');if(!a.token)return;fetch(API+'/api/user/sync-intimacy',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+a.token},body:JSON.stringify({intimacy:v})}).catch(function(){})}catch(e){}}
(function(){var ld=document.getElementById('letterDot'),rl=JSON.parse(localStorage.getItem('bsy_mail_read')||'[]');if(rl.indexOf('ann-welcome')!==-1)ld.classList.add('hidden')})();
(function(){updateIntimacy()})();
function updateIntimacy(){var i=Math.min(parseInt(localStorage.getItem('bsy_intimacy')||'0'),100);document.getElementById('intimacy-value').innerHTML=i+'<small>/100</small>';document.getElementById('intimacy-fill').style.width=i+'%'}
(function(){var mc=document.getElementById('moodCard'),mi=document.getElementById('moodIcon'),mt=document.getElementById('moodText'),mp=document.getElementById('moodPicker'),mo=document.getElementById('moodOverlay'),mg=document.getElementById('moodGrid');var sm=localStorage.getItem('bsy_mood')||'happy';renderMood(sm);MOODS.forEach(function(m){var it=document.createElement('div');it.className='mp-item'+(m.id===sm?' selected':'');it.innerHTML=m.icon+'<span class="mp-label">'+m.label+'</span>';it.setAttribute('data-mood',m.id);it.addEventListener('click',function(){selectMood(m.id)});mg.appendChild(it)});mc.addEventListener('click',function(){mp.classList.add('show');mo.classList.add('show')});mo.addEventListener('click',function(){mp.classList.remove('show');mo.classList.remove('show')});function selectMood(id){localStorage.setItem('bsy_mood',id);renderMood(id);mg.querySelectorAll('.mp-item').forEach(function(el){el.classList.toggle('selected',el.getAttribute('data-mood')===id)});setTimeout(function(){mp.classList.remove('show');mo.classList.remove('show')},200);try{var a=JSON.parse(localStorage.getItem('bsy_auth')||'{}');if(a.token)fetch(API+'/api/user/mood',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+a.token},body:JSON.stringify({mood:id})}).catch(function(){})}catch(e){}}function renderMood(id){var m=MOODS.find(function(x){return x.id===id})||MOODS[0];mi.innerHTML=m.icon;mt.textContent=m.label}})();
</script>
