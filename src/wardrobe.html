<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Beside You - 衣柜</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'PingFang SC', sans-serif;
      background: #FFF8F7;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80px 80px at 15% 15%, rgba(245, 200, 200, 0.2), transparent),
        radial-gradient(ellipse 60px 100px at 85% 20%, rgba(240, 210, 220, 0.15), transparent),
        radial-gradient(ellipse 100px 60px at 10% 80%, rgba(240, 220, 210, 0.15), transparent),
        radial-gradient(ellipse 70px 90px at 90% 75%, rgba(245, 200, 210, 0.12), transparent);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(1.5px 1.5px at 12% 18%, rgba(232, 180, 160, 0.5), transparent),
        radial-gradient(1px 1px at 48% 8%, rgba(240, 180, 200, 0.4), transparent),
        radial-gradient(1.5px 1.5px at 78% 45%, rgba(232, 180, 160, 0.35), transparent),
        radial-gradient(1px 1px at 32% 62%, rgba(240, 180, 200, 0.3), transparent),
        radial-gradient(1px 1px at 88% 28%, rgba(255, 200, 180, 0.35), transparent),
        radial-gradient(1.5px 1.5px at 22% 82%, rgba(240, 180, 200, 0.25), transparent);
      pointer-events: none;
      z-index: 0;
      animation: twinkle 3s ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .header {
      position: relative;
      height: 88px;
      padding: 44px 20px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 248, 245, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(240, 210, 210, 0.4);
      z-index: 10;
      flex-shrink: 0;
    }

    .header .back {
      position: absolute;
      left: 16px;
      top: 48px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
    }

    .header .back svg {
      width: 20px;
      height: 20px;
      stroke: #A07070;
      stroke-width: 2;
      fill: none;
    }

    .header .title {
      font-size: 15px;
      color: #5D4040;
      font-weight: 500;
      letter-spacing: 1px;
      font-style: italic;
    }

    .header .ornament {
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .header .ornament::before,
    .header .ornament::after {
      content: '❦';
      font-size: 10px;
      color: #E0B0B0;
    }

    .header .ornament .center-gem {
      width: 6px;
      height: 6px;
      background: linear-gradient(135deg, #F5C4C4, #E8A0A0);
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(232, 160, 160, 0.4);
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .preview {
      height: 45vh;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .preview::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 180px;
      height: 260px;
      border-radius: 50%;
      border: 2px solid rgba(232, 180, 180, 0.25);
      box-shadow:
        0 0 0 4px rgba(255, 248, 245, 0.3),
        0 0 0 6px rgba(232, 180, 180, 0.12),
        inset 0 0 40px rgba(245, 200, 200, 0.08);
      pointer-events: none;
    }

    .preview .character {
      height: 100%;
      object-fit: contain;
      animation: breathe 3s ease-in-out infinite;
      position: relative;
      z-index: 1;
    }

    @keyframes breathe {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-6px) scale(1.005); }
    }

    .preview .decor-left,
    .preview .decor-right {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0.5;
      font-size: 14px;
      color: #E0B8B8;
    }

    .preview .decor-left { left: 16px; }
    .preview .decor-right { right: 16px; }

    .preview .outfit-name {
      position: absolute;
      right: 20px;
      bottom: 50%;
      transform: translateY(50%);
      font-size: 11px;
      color: #8A6060;
      font-style: italic;
      letter-spacing: 1px;
      writing-mode: vertical-rl;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 12px 6px;
      border-radius: 16px;
      border: 1px solid rgba(232, 180, 180, 0.3);
      box-shadow: 0 2px 8px rgba(232, 160, 160, 0.08);
      z-index: 2;
    }

    .tabs {
      display: flex;
      gap: 0;
      padding: 0 16px;
      background: rgba(255, 248, 245, 0.75);
      border-bottom: 1px solid rgba(240, 210, 210, 0.3);
      border-top: 1px solid rgba(240, 210, 210, 0.3);
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      font-size: 12px;
      color: #B8A0A0;
      position: relative;
      cursor: pointer;
      transition: color 0.2s;
    }

    .tab.active {
      color: #7D5050;
      font-weight: 500;
    }

    .tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 2px;
      background: linear-gradient(90deg, #F5C4C4, #E8A0A0);
      border-radius: 2px;
    }

    .wardrobe-grid {
      padding: 12px 16px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      overflow-y: auto;
      flex: 1;
    }

    .wardrobe-grid::-webkit-scrollbar { width: 0; }

    .outfit-card {
      aspect-ratio: 3/4;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1.5px solid rgba(232, 190, 190, 0.35);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
      padding-bottom: 6px;
    }

    .outfit-card:active { transform: scale(0.95); }

    .outfit-card.active {
      border-color: rgba(232, 150, 150, 0.6);
      box-shadow: 
        0 0 12px rgba(232, 160, 160, 0.2),
        inset 0 0 12px rgba(245, 200, 200, 0.1);
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      0% { box-shadow: 0 0 8px rgba(232, 160, 160, 0.15), inset 0 0 8px rgba(245, 200, 200, 0.05); }
      100% { box-shadow: 0 0 16px rgba(232, 160, 160, 0.25), inset 0 0 16px rgba(245, 200, 200, 0.1); }
    }

    .outfit-card .thumb {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120%;
      height: 100%;
      object-fit: cover;
      object-position: center 40%;
      transition: transform 0.3s ease;
    }

    .outfit-card.active .thumb {
      transform: translateX(-50%) scale(1.05);
    }

    .outfit-card .name {
      position: relative;
      z-index: 2;
      font-size: 9px;
      color: #6D5050;
      text-align: center;
      background: rgba(255, 248, 245, 0.85);
      padding: 2px 6px;
      border-radius: 8px;
      border: 1px solid rgba(232, 190, 190, 0.2);
    }

    .outfit-card.locked {
      opacity: 0.45;
    }

    .outfit-card.locked::after {
      content: '🔒';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 16px;
      z-index: 3;
    }

    .outfit-card .rarity {
      position: absolute;
      top: 5px;
      left: 5px;
      font-size: 9px;
      font-weight: 700;
      font-style: italic;
      letter-spacing: 0.5px;
      z-index: 2;
      background: linear-gradient(135deg, #D4A44C, #F0D080, #C89030);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 1px 2px rgba(180, 140, 60, 0.3));
    }

    .outfit-card::before {
      content: '';
      position: absolute;
      top: -1px;
      right: -1px;
      width: 14px;
      height: 14px;
      border-top: 1.5px solid rgba(232, 180, 180, 0.4);
      border-right: 1.5px solid rgba(232, 180, 180, 0.4);
      border-top-right-radius: 14px;
      z-index: 2;
      pointer-events: none;
    }

    .bottom-bar {
      padding: 10px 16px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      background: rgba(255, 248, 245, 0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(232, 190, 190, 0.3);
      display: flex;
      gap: 12px;
      z-index: 10;
      flex-shrink: 0;
    }

    .btn {
      flex: 1;
      height: 38px;
      border-radius: 20px;
      border: none;
      font-size: 13px;
      cursor: pointer;
      transition: transform 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: linear-gradient(135deg, #F5C4C4, #E8A0A0);
      color: #fff;
      box-shadow: 0 4px 12px rgba(232, 160, 160, 0.25);
      border: 1px solid rgba(255, 200, 200, 0.5);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.65);
      border: 1.5px solid rgba(232, 190, 190, 0.4);
      color: #7D5555;
    }
  </style>
</head>
<body>
  <div class="header">
    <a class="back" href="index.html">
      <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
    </a>
    <div class="title">Wardrobe</div>
    <div class="ornament">
      <div class="center-gem"></div>
    </div>
  </div>

  <div class="main">
    <div class="preview">
      <div class="decor-left">
        <span>❧</span>
        <span>┊</span>
        <span>✿</span>
        <span>┊</span>
        <span>❧</span>
      </div>
      <img class="character" src="../assets/%E7%9D%A1%E8%A3%99.png" alt="珩">
      <div class="outfit-name">月光睡裙</div>
    </div>

    <div class="tabs">
      <div class="tab active">全部</div>
      <div class="tab">日常</div>
      <div class="tab">正装</div>
      <div class="tab">限定</div>
    </div>

    <div class="wardrobe-grid">
      <div class="outfit-card active">
        <span class="rarity">SR</span>
        <img class="thumb" src="../assets/%E7%9D%A1%E8%A3%99.png" alt="睡裙">
        <div class="name">月光睡裙</div>
      </div>
      <div class="outfit-card">
        <span class="rarity">R</span>
        <img class="thumb" src="../assets/%E5%8D%AB%E8%A1%A3.png" alt="卫衣">
        <div class="name">慵懒卫衣</div>
      </div>
      <div class="outfit-card">
        <span class="rarity">R</span>
        <img class="thumb" src="../assets/jk.png" alt="JK">
        <div class="name">初恋JK</div>
      </div>
      <div class="outfit-card">
        <span class="rarity">SR</span>
        <img class="thumb" src="../assets/%E7%A2%8E%E8%8A%B1%E8%A3%99.png" alt="碎花裙">
        <div class="name">碎花裙</div>
      </div>
      <div class="outfit-card locked">
        <span class="rarity">SSR</span>
        <img class="thumb" src="../assets/%E7%9D%A1%E8%A3%99.png" alt="锁定">
        <div class="name">落樱和服</div>
      </div>
      <div class="outfit-card locked">
        <span class="rarity">SR</span>
        <img class="thumb" src="../assets/%E7%9D%A1%E8%A3%99.png" alt="锁定">
        <div class="name">深夜舞会</div>
      </div>
      <div class="outfit-card locked">
        <span class="rarity">SSR</span>
        <img class="thumb" src="../assets/%E7%9D%A1%E8%A3%99.png" alt="锁定">
        <div class="name">星海礼服</div>
      </div>
      <div class="outfit-card locked">
        <span class="rarity">SR</span>
        <img class="thumb" src="../assets/%E7%9D%A1%E8%A3%99.png" alt="锁定">
        <div class="name">冬日温暖</div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="btn btn-secondary">收藏</button>
    <button class="btn btn-primary">换上</button>
  </div>
</body>
</html>
